body:
  text: 匡廬憨山釋德清述秀水寓公高承埏補嘉興上士錢應金較首山念禪師傳汝州首山省念禪師萊州狄氏子出家于本郡南禪寺授具徧遊叢席常密誦法華經眾目為念法華晚于風穴會下充知客一日侍立次穴乃垂涕告之曰不幸臨濟之道至吾將墜于地矣師曰觀此一眾豈無人耶穴曰聰明者多見性者少師曰如某者如何穴曰吾雖望子之久猶恐躭著此經不能放下師曰此亦可在願聞其要穴遂上堂舉世尊青蓮花目顧視大眾乃曰正當恁麼時說個甚麼若道不說而說又是埋沒先聖且道說個甚麼師乃拂袖下去穴擲下拄杖歸方丈侍者隨後請益曰念法華因甚不祇對和尚穴曰念法華會也次日師與真園頭同問訊穴問真曰作麼生是世尊不說說真曰鵓鴣樹頭鳴穴曰汝作許多癡福作麼又問師曰汝作麼生師曰動容揚古路不墮悄然機穴謂真曰何不看念法華下語師受風穴印可泯跡弢光人莫知之後開法于首山大振臨濟之道是為南嶽下八世贊曰七軸蓮經持之已久一言放下即知本有不說之說舉著便見拂袖而行何等快便永明壽禪師傳杭州慧日永明延壽智覺禪師餘杭王氏子總角歸心佛乘既冠不茹葷日惟一食持法華經六旬能誦年二十八為華亭鎮將吳越文穆王知師慕道乃從其志遂禮龍冊寺翠巖為師執勞忘身從事衣不繒纊食不重味野蔬布襦以遣朝夕尋往天台山九旬習定有鳥巢于衣襵中既謁韶國師一見深器之密授玄旨仍謂曰汝與元帥有緣他日大興佛事初住雪竇僧問雪竇一徑如何履踐師曰步步寒花結言言徹底氷師有偈曰孤猿呌落中宵月野客吟殘半夜燈此境此時誰得意白雲深處坐禪僧錢忠懿王請開山靈隱明年遷永明眾盈二千居十五載度弟子一千七百人入天台山度戒約萬人放諸生類不可稱計日作一百八件方便行道餘力持法華經計萬三千部著宗鏡錄百卷詩偈賦凡千萬言海外高麗王遣書敘弟子禮彼國僧三十六人皆承印記青原下十世贊曰乘大願輪出為法瑞總持門開眾行畢備懸一心鏡朗照萬物佛日中天無幽不燭慈明圓禪師傳潭州石霜楚圓慈明禪師全州李氏子少為書生年二十二依湘山隱靜寺出家其母有賢行使之遊方聞汾陽道望遂往而謁焉陽顧而默器之經二年未許入室每見必詬罵或毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事未明失出家之利語未卒陽熟視罵曰是惡知識敢販我怒舉杖逐之師擬伸救陽掩師口乃大悟曰是知臨濟道出常情服役七載辭去依唐明嵩禪師嵩謂師曰楊大年內翰知見高入道穩實子不可不見師乃往見大年機語相投恨見之晚年于朝中見駙馬都尉李遵勗曰近得一道人真西河獅子李曰我以拘文不能就見柰何年默然歸語師曰李公佛法中人聞道風遠至有願見之心政以法拘于是師黎明謁李公一見欣然相契至是師與楊李二老為法門稱最密及李公終師為之臨壙仁宗聞而嘉之有旨官舟賜歸師出世說法後住石霜師嗣汾陽昭為南嶽下十世贊曰西河逆機見者不識親遭掩口鼻孔打失其機迅發脫不可覊明眼稱之真獅子兒天衣懷禪師傳越州天衣義懷禪師永嘉樂清陳氏子世以漁為業母夢星殞于屋乃孕及產尤多吉祥兒時坐船尾父得魚付師貫之師即私投江中父怒笞之師恬然如故有出世智長遊京師依景德寺為童行後試經得度初謁金鑾善葉縣省皆蒙印可後至姑蘇禮明覺于翠峯覺問汝名甚麼曰義懷覺曰何不名懷義曰當時致得覺曰誰汝立名曰受戒來十年矣覺曰汝行脚費却多少草鞋曰和尚莫瞞人好覺曰我也沒量罪過你也沒量罪過你作麼生師無語覺打曰脫空謾語漢出去一日入室次覺曰恁麼也不得不恁麼也不得恁麼不恁麼總不得師擬議覺又打如是者數四尋為水頭因汲水擔折忽墮大悟作投機偈曰一二三四五六七萬仞峯頭獨足立驪龍頷下奪明珠一言勘破維摩詰覺聞撫几稱善後七坐道場化行海內嗣法甚眾是為青原下十世贊曰本性慈悲來酬夙帳見了魚兒隨手便放一出塵網遂登覺地擔折桶脫虗空粉碎佛印元禪師傳佛印禪師諱了元字覺老浮梁人姓林氏世業儒師生二歲琅琅誦論語諸家詩五歲誦詩三千首既長從師受五經通大義因讀楞嚴經有省盡棄所習白父母求出家禮寶積寺沙門日用試法華得度授具後遊廬山謁開先暹道者暹自負為海上橫行俯視後進師與問答捷給乃稱賞遂為其嗣謁圓通訥訥曰骨格已似雪竇後來之俊也留掌書記江州承天虗席訥薦元當選時年二十八矣自承天遷淮之斗方廬之開先歸宗潤之金焦江西之大仰雲居凡四十年間德化緇素縉紳之賢者多與之遊東坡謫黃州師居歸宗酬酢妙句與雲霞爭麗矣時李伯時為師寫照師曰必為我作笑狀自為贊曰李公天上石麒麟傳得雲居道者真不為拈花明大事等閒開口笑何人泥牛漫向風前齅枯木無端雪裏春對現堂堂俱不識太平時代自由身元符元年正月四日聽客語有會心者一笑而化如所畵狀贊曰文字習氣生來漏逗橫口說禪不落窠臼預畵笑容不知何為軒渠而化只這便是黃龍南禪師傳隆興府黃龍慧南禪師信州張氏子出家參方依泐潭禪師分座說法名振諸方後謁慈明聞慈明貶剝諸方件件數為邪解師為之氣索遂造其室明命掌書記屢聞示不契一日明問趙州道臺山婆子為我勘破了也且道那裡是他勘破婆子處師汗下不能加答次日又詣明詬罵不已師曰罵豈慈悲法施耶明曰你作罵會那師于言下大悟作頌曰傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為讐呈慈明明頷之後開法于同安機辯自在室中甞問僧曰人人有個生緣上座生緣在甚麼處正當問答時却伸手曰我手何似佛手又問諸方參請宗匠所得復垂脚曰我脚何似驢脚如此三十餘年衲子少有契其機者謂之黃龍三關語大振臨濟之道是為南嶽下十一世贊曰西河獅子父子門風倒握太阿誰敢當鋒師一攖之聖凡情盡室中三關全提正令楊岐會禪師傳袁州楊岐方會禪師郡之宜春冷氏子少警敏及冠不事筆硯繫名征商課最坐不職乃宵遯至瑞州九峰恍若舊遊眷不忍去遂落髮每閱經心融神會參叩慈明自南源徙道吾石霜師皆佐總院事依之雖久然未有省發每咨參明曰庫司事繁且去他日又問明曰監寺異時兒孫遍天下在何用忙為一日明適出雨忽作師偵之小徑既見遂搊住曰這老漢今日須與我說不說打你去明曰監寺知是般事便休語未卒師大悟即拜于泥塗問曰狹路相逢時如何明曰你且軃避我要那裡去師歸來日具威儀詣方丈禮謝明曰未在自是明每山行師輒瞰其出雖晚必擊皷集眾明遽還怒曰少叢林暮而陞座何從得此規繩師曰汾陽晚參也何謂非規繩乎時時激揚宗旨及明移興化師辭歸九峯後道俗迎居楊岐大振慈明之道是為南嶽下十一世贊曰荷擔大法綱維叢林狹路相逢一語見心異時兒孫遍滿天下源遠流長根深枝大白雲端禪師傳舒州白雲守端禪師衡州葛氏子幼事翰墨長依茶陵郁禪師披剃往參楊岐岐一日忽問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河朵朵岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打毆儺者麼曰見岐曰汝一籌不及渠師復駭曰意旨如何岐曰渠愛人笑汝怕人笑師大悟巾侍久之辭遊廬阜圓通訥禪師舉住承天聲名藉甚又遜居圓通次徙法華龍門興化海會所至眾如雲集隨處上堂示眾機語超絕是為南嶽下十二世贊曰久把明珠秘為奇貨及遇作家一笑便墮看破笑處自亦絕倒信手拈來無非是寶五祖演禪師傳蘄州五祖法演禪師綿州鄧氏子年三十五始棄家祝髮受具往成都習唯識百法論因聞菩薩入見道時智與理冥境與神會不分能證所證西天外道甞難比丘曰既不分能證所證却以何為證無能對者後玄奘三藏至彼救云如人飲水冷暖自知乃通其難師曰冷暖則可知矣作麼生是自知的事遂致疑本講師莫疏其問但曰汝欲明此當往南方扣傳佛心宗者師即負笈參方每見尊宿無不以此咨決疑終不破後謁浮山遠禪師請益遠云我有個譬喻說似你你一似個三家村裡賣柴漢子把個匾擔向十字街頭立地問人今日中書堂商量甚麼事師默計若如此大事故未在遠一日語師曰吾老矣恐虗度子光陰可往依白雲此老必能了子大事師辭至白雲遂舉僧問南泉摩尼珠話請益雲叱之師領悟獻投機偈曰山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲印可後分座說法晚居東山為南嶽下十三世贊曰出門不利即撞擔板逢人便問祇好遮眼幸遇作家一椎打破掉轉頭來方知話墮無準範禪師傳徑山無準禪師諱師範蜀之梓潼人姓雍氏出家授具參學來杭州見松源岳于靈隱謁破庵先禪師于平江一言之下頓悟玄旨出世明州清凉移焦山遷雪竇召住育王遷徑山召入對修政殿賜金襴僧衣又宣詔慈明殿陞高座說法帝垂簾而聽賜號佛鑑禪師贊曰一語投機十方通透舌根雷奔衲僧雲凑兩入內廷提挈萬乘不假他力全憑正令四明法智知禮法師傳法智法師諱知禮字約言四明金氏子母李氏乏嗣父母禱于佛夢神僧携童子遺之曰此佛子羅睺羅也因有娠暨生神宇清粹不與眾倫七歲喪母號哭不絕白父求出家遂捨依太平興國寺洪選師十五授具專探律部時寶雲法師專弘天台教觀師時年二十往從之始三日首座謂之曰法界次第汝當奉行師曰何謂法界座曰大總相法門圓融無礙者是也師曰既圓融無礙何有次第座無對居一月自講心經聽者服其速悟五年其父夢師跪于寶雲之前雲以瓶水注其口自是圓頓之旨一受即了甞代寶雲講雲歸寂師復夢貫寶雲之首擐于左臂而行師自解曰將作初表受習流通次表操持種智之首化行于世也後受請出世主乾符後徙報恩院大興建以為長講天台教法十方住持之地師精勤懺法苦志操修博學多聞長于著述善申詰難天台一家教觀至宋久湮先是寶雲講二十年尤多異計至師廣設問難發明一心三觀之旨故台宗以師為中興焉著作甚多具載別錄贊曰台之一家遠宗龍樹教觀分明觸者多悟五百年來其維不張實生吾師大振其綱雪巖欽禪師傳補袁州仰山雪巖祖欽禪師婺州人五歲出家十六為僧十八至雙林鐵橛遠公會下初看無字忽返觀念頭起處當下氷冷澄湛不搖過一日如彈指頃都不聞鐘皷聲年十九挂搭靈隱見處州來書記云欽禪工夫是死水不濟事動靜二相打作兩橛參禪須是起疑情小疑小悟大疑大悟師便改看乾屎橛却因昏散不得頃刻潔淨移單過淨慈參天目禮結甲坐禪封被不臥一日問修上座即今昏散打屏不去修曰你自不猛烈須是盡渾身併作一個話頭更討甚昏散師依此做工夫頓覺身心兩忘三晝夜目不交睫第三日午後在三門下經行修問在此做甚麼曰辦道修曰你喚甚麼作道不能對轉加迷悶遂歸堂坐禪纔上蒲團面前豁然一開如地陷一般是時呈似人不得便下單尋修修見便云且喜且喜握手出門前柳堤上行見萬象森羅向來厭棄之物與無明煩惱元都是玅明真性中流出半月餘動相不生然于中夜睡著又却打作兩橛凡古人公案有義路者則理會得如銀山鐵壁者却又不會後見無準範公于徑山因鑄鐘令作疏語師成偈曰通身只是一張口百鍊爐中輥出來斷送夕陽歸去後又催明月上樓臺即俾居侍司十年然猶不得徹悟因過浙東天童育王兩山住一日在佛殿前行忽然擡頭見一枝古栢觸目省發礙膺之物撲然而散自謂如暗室中出在白日之下走一轉相似方始得見徑山老人立地處正好三十拄杖由是聲振叢林出世潭州龍興遷湘西道林處州南明佛日台州仙居護聖湖州光孝迨居袁州之仰山道遂大顯學者稱仰嶠再世云上堂曰個事本成現覓則不可見白圭本無瑕琢磨乃成玷執之以實法空中生閃電視之似等閒脚下添紅線若是學道人好好看方便作麼生莫看仙人手中扇普說曰時不待人轉眼便是來生何不趂身強力徤打教徹去討教明白去何幸又得在此名山大澤神龍世界祖師法窟安單僧堂明淨粥飯精潔湯火穩便若不向這裡打教徹討教明白去是你自暴自棄自甘陸沉為下劣愚癡之漢你若果是茫無所知何不博問先知凡遇五參見曲彔牀上老漢橫說豎說何不歷在耳根反覆尋思畢竟是個甚麼道理是為南嶽下二十世贊曰知見若存關棙猶隔觸破琉璃殿前古栢借仰山座通楊岐脉全提正令千妖喪魄無用寬禪師傳補舒州太湖山無用寬禪師得法金牛真門庭嚴峻先後主金牛離相寺太平乳山太湖梁山淨戒正覺諸大剎俱有語錄行於世一源寧求印可方入戶師厲聲叱出寧作禮門外合爪而立久之乃許入師問曰何處人曰通州師曰淮海近日盈虗若何曰沃日滔天不存涓滴師曰不著漕道曰請和尚道師便喝寧退就禪室徹夜不寐一日聞師舉雲門一念不起語聲未絕而有省急趨入堂師便打令造偈拈趙州寧立成曰趙州狗子無佛性萬象森羅齊乞命無底籃兒盛死蛇多添少減無餘剩師嗒然一笑復舉證道偈問曰掣電飛來全身不顧擬議之間聖凡無路速道速道寧曰火迸星飛有何擬議覿面當機不是不是師振威一喝寧曰喝作麼師曰東瓜山前吞扁擔捉住清風剝了皮寧不覺通身汗下曰今日方知和尚用處師曰閉著口寧侍左右三年師以斷崖義所贊己像親署一花授之曰逢龍即住遇池便居寧後建禹門興化庵于龍池實應其讖宋學士濂云無用其鐵中之錚錚者與是為南嶽下二十世贊曰好個阿師十分標格門庭高峻言無枝葉活剝了皮露出清風且閉著口一線不通高峯妙禪師傳天目高峯禪師諱原妙吳江人姓徐氏母周氏夢僧乘舟投宿而孕生而喜趺坐見僧入門則愛戀欲從之遊十五懇請父母出家投嘉禾密印寺法住為師薙髮受具二十入淨慈立三年死限學禪父兄尋訪巍然不顧後參雪巖欽禪師方問訊即打出閉却門再往始得親近一日巖忽問阿誰與你拖箇死尸來聲未絕即打如是者不知其幾後覩五祖演和尚真贊云返復元來是這漢忽然打破拖死尸之疑及見巖巖仍前問師便喝巖拈棒師把住曰今日打某甲不得翌日巖問萬法歸一一歸何處師曰狗䑛熱油鐺自是機鋒不讓一日巖問正睡無夢時主人公在甚麼處師無語自是奮志入龍鬚決要發明越五年因同宿推枕子落地作聲廓然大悟乃謂如遠客還鄉只是舊時人不改舊時行履處後入天目獅子巖最險絕處立死關髮長不剪截甕為鐺併日一食晏如也時巖住大仰三喚不起乃付麈拂印記後出世其道大振遂有他方異域越重海踰萬山而來者贊曰雪巖之險壁立萬仞惟師登之得其捷徑死關之險又踰于巖故望之者猶如登天鐵山瓊禪師傳補南嶽鐵山瓊禪師十八出家二十二薙髮受具先到石霜記得祥庵主云時時觀見鼻頭白從此下工便得清淨及見雪巖坐禪箴始知工夫未當乃往見雪巖于仰山一依所示用工一日忽覺從頭至足如擘破髑髏相似如萬丈井底被提出在空中相似舉似巖巖曰未在更去做工夫求得法語末句云紹隆佛祖向上事腦後依然欠一槌巖順世師以離巖太早再謁蒙山山問參禪到甚麼處是畢工處師罔然山教做定力工夫洗盪塵習每遇入室下語只道欠在一日以定力挨拶直造幽微出定舉似山山問那個是你本來面目正欲下語山便閉門自此工夫日有玅處但入室下語猶道欠在一日定中忽觸著欠字身心豁然如積雪卒然開霽忍俊不禁跳下單來擒住山曰我欠個甚麼山打三掌師禮三拜山曰鐵山這一著子幾年今日方了後住南嶽道風大播高麗國王請為國師聲振海外後復還石霜嗣雪巖焉千巖長公䟦師開示語曰鐵山和尚一條硬脊骨抝不折親承仰山慧朗老人之記為高麗一國之師登其門升其堂無慮億萬計是為南嶽下二十一世贊曰髑髏觸破再下一槌本無欠少錯過幾回薰天炙地海外網開法無藏處萬里歸來中峯本禪師傳天目中峯禪師諱明本號幻住杭之錢塘人俗姓孫母李氏夢無門開道者打燈籠至其家翌日遂生師神儀挺異具大人相纔離襁褓便跏趺坐能言便歌讚梵唄凡嬉戲必為佛事年十五決志出家遇僧招師往參天目高峯和尚峯孤峻嚴冷不假人辭色一見歡然欲為祝髮師以父命未許至年二十四從高峯薙染于獅子院授具明年觀流泉有省詣峯求證峯打趂出既而民間訛傳官選童男女師因問曰忽有人來問和尚討童男女時如何峯曰我但度竹篦子與他師于言下洞然陸沉眾中人無知者于是高峯書真贊付之師曰我相不思議佛祖莫能視獨許不肖兒得見半邊鼻且俾參徒詣師請益眾由此知歸及高峯將遷化以大覺屬師師辭推第一座主之師自後往遊皖山廬阜少林金陵隨處結幻住庵學人叢聚于儀真船居朝廷聞師道風賜佛慈圓照廣慧禪師之號一時王公駙馬莫不致禮翰林承旨趙公孟頫以師禮之時問法要有別傳覺心師說法無礙有廣錄三十卷行于世贊曰天目窟中真獅子兒爪牙才露百獸奔馳孤風凜凜法海洋洋是故我師稱法中王斷崖義禪師傳補斷崖了義禪師湖州德清人姓湯氏生不茹葷六歲始能言但從其母誦法華經餘懵無所知年十七聞禪者誦高峯上堂語曰欲窮千里目更上一層樓師忽曰此大善知識必能為人拔釘去楔願見之母張氏俶裝與行見高峯于獅子巖之死關峯令參萬法歸一一歸何處話因名之曰從一他日聞峯舉牛過窓櫺話師疑甚一日過鉢盂塘見松上雪墜有省即呈頌曰不問南北與東西大地山河一片雪聲未絕峯痛棒之不覺墜身崖下同學明通馳救之已出半山無所苦曰我見欽公去也通曰莫負老漢棒力挽之乃自誓七日不證則決去遂壁立達旦未及所期忽大悟馳至死關呼曰老和尚今日瞞我不得也呈頌曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東峯因上堂云我布漫天大網打鳳羅龍今日有蟭螟蟲撞入三十年後向孤峯絕頂揚聲大呌且道呌個甚麼舉拂子云大地山河一片雪師便奪峯拂子為眾舉揚峯歎其俊快改名曰了義從此剃落所至歸重師性嚴峻或觸其鋒則發言如奔雷居不擇地而律範凜如氷雪師子正宗等寺屢請住持俱不應泰定三年師壽七十始狥眾請居一載示眾曰不可起一念精進心不可起一念懈怠心不可起一念求悟心不可起一念得失心纔有念生即被一切邪魔入心腑使爾顛狂胡說亂道永作魔家眷屬佛也難救元統二年正月六日詣法雲塔西指空地曰此處更好立個無縫塔其晚謂禪者曰老僧明日天台去禪者曰某甲隨師去曰你走馬也趂我不及翌午跏趺而化世壽七十二僧臘四十九藏全身于獅子巖後之雲深庵詔賜號佛慧圓明正覺普度大師是為南嶽下二十二世贊曰千崖坐斷粉碎洪濛眼空四海鼻舌俱通松上雪消崖邊雲墮大地山河喚作甚麼絕學誠禪師傳補洪州般若寺絕學世誠禪師大德間鐵牛持定住靈雲唱雪巖之道師為其上足甞示眾云兄弟家三年五年做工夫無個入處將從前話頭拋却不知行到中途而廢可惜前來許多心機有志之士看眾中柴乾水便僧堂溫煖發願三年不出門決定有個受用有等纔做工夫心地清淨但見境物現前便成四句將謂是大了當人口快舌便悞了一生三寸氣消將何保任佛子若欲出離參須真參悟須實悟後仰山古梅正友請益求住師曰你去見無用中峯斷崖三人了却來與我同住後梅到雪巖閱法昌語錄至驅耕奪食忽有徹處便頌公案數則寄呈師師曰此人得我第三番竹篦上氣力但欠脫殻在越三年梅因過堂打動鉢始大悟是為南嶽下二十二世贊曰據曲彔牀提長柄拂用鐵牛機碎千聖骨亦名瞎禿亦名古佛千巖道破是第二月千巖長禪師傳千巖禪師諱元長字無明千巖別號也越之蕭山黃氏子父九鼎母何氏晚而生師七歲從外傳諸書經目輒成誦師之諸父曇芳為僧欲乞為嗣從之十九薙染受具干律師知為法器一日從飯僧于丞相府時中峯在座遙見師即呼問曰汝日用何如師曰唯念佛耳峯曰佛今何在師方擬議峯厲聲叱之師遂胡跪作禮求示法要峯以狗子無佛性話授之師從此參究危坐脇不至席者三年因聞鵲聲有省亟見峯具陳所悟峯復斥之師憤然來歸一夜將寂忽鼠翻食猫器墮地有聲恍然大悟覺身躍起數丈如蟬蛻污濁之中浮游玄間上天下地一時清朗披衣待旦復往質于峯峯問曰趙州何故云無師曰鼠食猫飯峯曰未也師曰飯器破矣峯曰破後云何師曰築碎方甓峯乃微笑囑曰汝宜善自護持棲遯巖穴時節若至其理自彰師既受囑乃隱天龍躭悅禪味後聲光日顯笑隱訢公力薦之諸山爭相勸請後至烏龍山有終焉之志尋建剎開化學者輻凑大振天目之道有語錄行于世贊曰問佛何在尋之不見鼠翻猫器忽然出現躍身如空應聲若響不是這番幾沈妄想無一全禪師傳補無一全禪師元延祐間遯跡石溪石溪與大洞相望洞左實相寺同時有一源寧居之人謂廣德二甘露門宋學士濂每稱焉一源者無用寬法嗣即龍池禹門開山禪師也師嗣法未詳昔應庵華為大慧杲法門猶子世稱其居處謂二甘露門以此類推師當為臨濟宗又甞見千巖長公有辭石溪請偈曰出世宗師萬萬千只餘迦葉守枯禪老僧若也隨流去孤負山居三十年又送全上人偈曰全然不識自觀音訪我伏龍山更深四月初頭三月盡黃鶯啼過綠楊陰意者是其人耶贊曰無一一源是二是一鉢𨨄悉稱聲名洋溢名可得著語不得聞我思高致溪月石雲本空照禪師傳補本空禪師氏里嗣法未詳師顯圓融廣大法門甞于石溪建松雲閣繪三教聖賢像悉藏其書于中或謂辨魔揀異宗門眼目秤觔定兩向上鉗鎚豈可雷同事須甄別師曰會麼瓶盤釵釧一金毒藥醍醐一味千巖長公稱師為巨靈劈大華之手芥子納須彌之機又有答師二偈曰懊悔當初入此門至今無物獻家尊伯勞破鏡渾相似翻笑飛蝗多子孫雷聲未歇電光隨雪片飛空幾個知凜凜吹毛全殺活太平寰宇斬頑癡亦可知其人矣贊曰松雲萬朵溪山盤盤松風一曲溪月團團氷崖筍出炎天雪寒我之知師有友千巖大滿大禪師傳補大滿大禪師未詳何許人大滿為五祖賜諡不聞有二按裕州妙覺寺在七峰山前一名上古寺寺後為妙覺院元頤庵和尚居之初禮本院溫山主為師其後任慶壽居大剎至元十年賜號佛日滿大禪師十九年正月圓寂一云賜號佛日大滿大禪師未知即其人否也千巖長公有送滿禪人偈又有示慶雲滿長老偈抑或以滿為名者歟贊曰彼何人斯藏頭露尾是耶非耶為彼為此先有五祖後有頤庵本來面目劈破老憨季潭泐禪師傳補徑山宗泐禪師字季潭別號全室台州臨海人俗姓周氏生始能坐輒跏趺八歲從天竺笑隱訢公學佛十四薙度二十受具從隱開山于龍翔寓意詞章尤精古隷隱問國師三喚侍者三應於意云何師曰何得刲肉作瘡隱曰將謂汝奇特今故無所得也師一喝隱擬拈棒師拂袖出後乃得隱心印已而上徑山掌元叟端公記室出世涇縣水西寺大明洪武元年四月遷中竺入寺上堂曰金剛王劒橫揮千妖屏迹爍迦羅眼洞照萬物潛形到此卷舒在己殺活臨時直得千歲巖伸腰𨁝跳錢塘水東決逆流諸人還知有也無遂豎拂子云庭前石笋抽條也曾見高枝宿鳳凰四年正月住徑山次五十五代太祖高皇帝召西白金公問鬼神事詔舉高行沙門師居其首五年建普度大會于鍾山太平興國寺命師說法超度迷溺上臨筵歎美命住持天界寺屢駕臨幸召對內庭賜饍無虗日每和其詩稱為泐翁至百四十五首又命製讚佛樂章既成御署曲名曰善世曰昭信曰延慈曰法喜曰禪悅曰徧應曰妙濟曰善應凡八章勅太甞諧協歌舞之節用之著為定制十年冬詔師與太璞玘公註心經金剛楞伽三經行世十二年上以佛書有遺佚命領徒三十餘人往西域求之十五年得莊嚴寶王文殊等經還朝開僧錄司授右街善世掌天下僧教命蓄髮授以儒職師姑奉命至髮長上召而官之師懇辭求免願終釋門上乃嘉歎從之賜師免官說後以長官奏事獲譴往鳳陽槎枒峯建寺三年訖工天界寺火以興復為己任奏重建于聚寶門外二十三年詔再住天界二十四年復領右街善世居無何奉旨逸老歸槎峯上曰寂寞觀明月逍遙對白雲汝其往哉乃渡江至江浦石佛寺示微疾九月初十日晨起謂眾曰人之生滅如海一漚漚生漚滅復歸于水何處非寂滅地也言訖喚侍者曰這箇聻侍者茫然師曰苦遂寂世壽七十四夏六十茶毗牙齒數珠不壞得舍利三十顆建塔天界附笑隱塔右宋學士濂贊師像曰具大福德足以荷擔佛法證大智慧足以攝伏魔軍悟四喝三玄于彈指合千經萬論于一門真實錄也有全室外集十卷行世是為南嶽下二十一世贊曰龍飛九五法運更新如雲之從作國上珍終不受官天語益親末後傾出誰賡其音金碧峯禪師傳寂照圓明禪師諱寶金號璧峰乾州永壽人姓石氏父母俱崇善時有沙門以觀音像授其母張氏囑曰謹事之當生智慧之男未幾果生師白光燁燁照室幼多疾父母疑之曰此兒宜師釋氏耶年六歲遂捨依雲寂溫法師為弟子及長受具徧詣講肆窮性相之旨久之曰是可以了生死耶遂棄去時如海真禪師開法于蜀師往詣示以道要師大起疑情久之有悟呈真真大斥之曰必使心思路絕大法可明師益加精進三年脇不至席一日聞伐木聲汗下如雨急往求證于真真猶詰十數遍一一無滯乃印可之後至五臺秘魔崖知為前身住處遂棲止久之聲光日露四方聞而至者將集千人師不拒也至正間順帝遣使詔至京甚敬之命住海印寺力以疾辭賜寂照圓明之號大明太祖即位燕都手詔師師應天時見上于內殿問佛法大意上設普濟會于鐘山選高行僧十人蒞其事師偕楚石琦與焉寵賚甚渥未幾示微疾而化茶毗獲五色舍利齒舌數珠皆不壞贊曰世道交興真人應運雲龍風虎莫之能禁真金出鑛古鏡生光精明既發照用無方松隱然禪師傳補松隱德然禪師字唯庵松江華亭人姓張氏少從無用貴公祝髮歷抵諸方未有所契參千巖長公于金華聖壽禪師聞其提唱豁然有所悟入舉目之頃日月星辰風霆雨露飛潛動蟄皆演如來大乘妙法于是遂傳其道甞謁石室珙于霞霧山室曰子去我而求憩息之所其必松江乎書松隱二字授之以行師如其言至華亭郭匯之陽止焉結茅曰松隱庵千巖題頂相示師曰德兮無德然兮不然僧來便棒佛來便拳慈悲沒些子毒害有萬千道非道禪非禪我住松庵汝松隱要悟更參三十年巖沒遂主其席聲光聳起刺血寫經天花𣯶𣯶滿庭云洪武四年師念西天目獅子正宗寺為高峯中峯道場元季兵僧徒亡逸乃尋故址居之開山說法盡復前規信嚮者益眾宋學士濂甞曰唯庵真有道之士也又䟦其船居詩曰唯庵之詩托物為喻無非發明宗門心要有益學者其推重如此是為南嶽下二十四世贊曰面冷如霜口甜如蜜一味虗頭全無真實佛法不會世法不通賣了明月買得清風敬書先公重編諸祖道影傳贊後佑釲聞之靈峯素華法師矣釋之於十方三世無不徹也此界此時則始于釋迦繼于迦葉阿難等也其在震旦則遠公造法性論羅什歎其能知佛理北齊慧文大師讀龍樹中論悟圓頓心宗二竝可稱聞而知之菩提達磨大師受記東化可稱見而知之遠公之後凡修淨業得往生者皆見知聞知之流類也有人僅立蓮宗七祖但約行化最專者耳然四明尊者慈雲懺主等何甞不以淨土行化而智者大師十疑論飛錫法師寶王論天如禪師淨土或問楚石大師懷淨土詩妙叶法師念佛直指尤于淨土法門有功至雲棲大師極力主張淨土讚戒讚教讚禪痛斥口頭三昧真救世菩薩也憨山大師拓復曹溪祖庭晚年掩關念佛晝夜課六萬聲故坐逝後二十餘年開龕視之全身不散遂與六祖同留肉身人天瞻仰得非蓮宗列祖乎達磨傳至六祖乃有南嶽青原二甘露門門似二道無二也又數傳而為五宗人有五宗非五也譬如阿耨達池一水流為四河歸于大海河有四水無四也今不知池水與海之一獨從四河之濶狹曲直遠近起見互相是非其可乎哉近代禪宗自楚石琦大師後不媿古人風格者必首推紫栢大師壽昌無明禪師焉繼北齊者有南嶽思大師曰大乘止觀法門四卷真圓頓心要也次有天台顗大師出三種止觀法華玄義文句及維摩仁王金光明普門品十六觀等疏於是教觀大備歷五傳至荊溪其道中興又八傳至四明道乃重振此後裂為三家漸式微矣近則百松覺公稱為鳴陽孤鳳僅出三千有門頌略解及楞嚴百問耳幽溪無盡燈公繼起一時稱盛然唯生無生論足稱完璧而圓通疏殊未滿人意但能趺坐書空作妙法蓮華經字脫然西逝則誠蓮華國裡人矣唐玄奘法師徧遊天竺學唯識宗于戒賢法師盡其所知旁搜其所未知廣大精微真彌勒天親之子釋迦文佛之遠孫也慈恩基師繼之所撰法華玄贊則靈山法道恐未全知無怪乎唯識一書本是破二執之神劒反流為名相之學矣賢首法藏國師得武后為其門徒聲名藉甚疏晉譯華嚴經經既未備疏亦草略故不復傳所傳起信論疏甚失馬鳴大師宗旨方山李長者有新華嚴經頗得大綱清凉觀國師復出疏鈔綱目竝舉可謂登雜華之堂矣後世緇素往往獨喜方山大抵是心粗氣浮故耳不知清凉雖遙嗣賢首實青出于藍也圭峯則是荷澤知見宗徒支離矛盾安能光顯清凉之道哉或曰佛祖之道必須師資授受方有的據否則法嗣未詳終難取信靈峯曰譬諸儒家公伯寮非親炙宣尼告子滕更之徒非親炙孟子者乎學焉未成則終身不入聖域矣今之雖有師承顛覆如來教戒者何以異此朱子陸子生于宋薛文清公王文成公生於明後千百年遙傳道統今之雖乏師承能自契合佛祖心印者亦奚不然故執跡以言道則道隱譬諸射者期各中的焉耳十方三世唯此一的常住不變何俟于傳巧之與力存乎其人父不能得之子子不能得之父有何所傳或見而知之或聞而知之及其知之一也正知其不可傳者也謂有可傳則非佛祖聖賢之道也佑釲因是重有感矣南宋紹興間濟宗大慧杲住育王洞宗宏智覺住天童相得歡甚大慧一日過天童宏智出寺迓之會于亭中兩師交讓無已乃不次而坐張狀元安國歎曰三代禮樂今歸釋氏矣因以揖讓名其亭宏智甞曰脫我先去公當主後事及大慧得宏智遺書遂陞座說法有知音知後更誰知句夜至天童凡後事悉主之因舉宏智弟子法為繼天童席識者方知二尊宿各傳一宗而以道相與初無彼此之別也以視今之諸方門庭不同互相攻擊者為何如哉昔笑巖和尚嗣臨濟而不專臨濟之稱止稱傳曹溪正脉第三十二世意深遠矣今願當世大善知識見是書者直令宗教融通勿反于宗門中生分別想也康熈甲辰冬十月朔秀水高佑釲念祖父敬述於金臺之報國寺三大師傳贊序歷代諸祖道影八十八尊紫栢可公命曲阿弟子賀中翰知忍屬丁高士南羽描摹大內稿本憨山清公傳而贊之繪乃形似傳贊乃神似形似殆不如神似之勝然二公苦心不欲於紙上見諸祖又不妨於紙上見諸祖將作末劫津梁故令形神俱現耳前者吾友錢而介手書雪嶠信公製敘刊布流通其中缺傳贊者十一人承埏今為參考以補之惟是萬曆中一時有三大和尚雲棲興淨土以統宗教紫栢易方冊以廣大藏憨山濬曹溪以通法脉厥功德邈焉莫儔是足繼諸祖後者國朝三百年來名宿如林猶羣山之磊砢獨此三大師則如海上三峯巍然鼎峙乃憨山赴弔雲棲紫栢時早為二老像贊又甞自為像贊是三大師道影已有繪之者特傳未具耳憶先大夫玄期公在萬曆癸卯為先王父宇培公十週諷經雲棲津梁淨土時初登賢書即起名錢應金註先生法名廣瀇字明水受二戒呈偈曰偶從閒裡話秋闌碧樹當窓白日寒一笑不論千古事齋頭借得小蒲團蓮池大師稱善輒出衲衣衣之是冬計偕仝陸水部謁紫栢於請室語次有契紫栢手錄所貽憨山逐客說為贈憨山則壬辰癸巳間往來即墨之牢山曾王父瀛臺公時為膠州守頗竭檀護及其東遊先大夫曾偕至雲棲後奉使衡州復寓書曹溪請益是先大夫與三公俱有法乳之契承埏少聞梗槩故摭拾遺事各為傳贊以附諸祖之後至壽昌經車溪冲龍池傳少室道雲門澄黃檗有天童悟磬山修博山𫇣諸老雖先大夫多與盤桓今未暇及以俟續國朝傳燈錄者為紫栢補此慧命一大負耳若雪嶠甞答問語風中近復晤言東塔此又如三峯外別為一峯縹緲高騫孤巒特秀且雲棲早為印可紫栢葬其山中而憨山又特為著語是足繼三大師後者今杖履無恙姑俟後緣可也賜同進士出身工部尚書郎前遷安寶坻涇縣令蒙溫旨敘功紀錄旌異𭬥李寓公高承埏澤外父纂時崇禎閼逢涒灘之歲良月糓旦余於三大師宿有因緣雲棲曾侍巾瓶海印親承記莂而紫栢入滅之歲夢中委受付囑今讀高大夫寓公傳三大師揚眉瞬目如在尺幅間不覺肅然起拜若三老之外特標雪嶠信公豈所謂楚石之後獅絃絕響者於此另豎眼目耶念祖世繼金湯當自悉此中微指余未敢妄議也舊史氏虞山蒙叟錢謙益書附三大師傳贊卷之全秀水寓公高承埏述虞山蒙叟錢謙益訂嘉興上士錢應金較蓮池宏禪師傳師諱袾宏字佛慧別號蓮池浙江仁和人也姓沈氏年十七補諸生早棲心淨土甞書生死事大四字于几案及閱六祖壇經喟然曰茫茫生死安可無本據耶父母沒決志離俗嘉靖乙丑除夕命繼室湯點茶至案盞裂師顧曰姻緣無不散之理丙寅元旦與湯訣有一筆勾詞時年三十有二從性天理公祝髮無盡行公授具足戒尋禮五臺感文殊放光過伏牛山隨眾煉魔至北京龍華寺參徧融貞公融曰無貪利無求名無攀緣貴要之門惟一心辦道老實持戒念佛遂受六度萬行之囑參笑巖寶公於柳巷巖曰汝何處人師曰浙江人巖曰却為何事師曰特到這裏來求和尚開示巖曰阿你在三千里外遠遠來開示我教我將甚麼來開示你師恍然即禮辭歸過東昌府聞譙樓鼓聲忽大悟作偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非分衛至南京瓦棺寺病革即有欲以就茶毗者師微曰一息尚存乃止病間至湖州之南潯住豆腐橋廢祠中苦行三年無一知者五與越中禪期終不識鄰單姓字隆慶辛未乞食杭州之梵村見山水幽寂遂有終焉之志山故宋伏虎志逢禪師剎也圮於巨浸環山多虎歲傷人不下數十師結茅三楹居焉諷經施食虎患頓息歲旱眾強師出禱師循田念佛甘雨隨注眾異之相與助建禪林安居學者即今雲棲道場也萬曆丙子再禮五臺己卯庚辰間復參笑巖寶公於京西觀音庵無何以疾南還梵村有朱橋屢為潮汐衝塌行者病涉師倡復無論貴賤請人施八分而止或疑其少師曰心力多則功自不朽不日集千金鳩工築基每下一樁持呪百遍潮汐不至者數日橋竟成戊子歲大饑疫日斃千人余知府良樞請師就靈芝寺禳之疫遂止壬辰歲杭之淨慈寺請講圓覺經聽者日數萬指因贖門外萬工池并城中上方寺長壽庵二池為放生所既又助濬西湖三潭所著戒殺文海內多奉行之慈聖皇太后見師放生文遣內侍頒賜蟒龍袈裟設供問法要師敬以偈答而什襲紫衣不敢服慈聖繪像宮中禮焉師道價日增四眾翕聚而清規益肅凜若氷霜達觀可公贊師有末法戒壇成酒社東南撐柱仰高風之句憨山清公則稱其一味慈悲十分清淨幻有傳公與師同參笑巖其刻語錄也致書雲棲推師為當世金剛正眼乞作唱導語一時賢士大夫問道者指不勝屈王侍郎宗沐問夜來牀頭老鼠唧唧說盡一部華嚴經師云猫兒突出時如何王無語師代云走却法師留下講案因頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑猫兒突出畵堂前牀頭說法無消息無消息大方廣佛華嚴經世主妙嚴品第一朱居士鷺問參禪念佛可用融通否師曰若然是兩物用得融通著左太甞宗郢問念佛得悟否師曰返聞聞自性性成無上道又何疑返念念自性耶虞光祿淳熈問慧日入西院公案師答曰慧日自甘窮子捨己從人西院屈陷平民將生就死可惜五百僧只解點著便行曾無一二高臥不起令慧日顯異惑眾禍及兒孫周侍郎汝登問鳥窠吹布毛機緣師答曰諸惡莫作眾善奉行當下布毛滿地何待拈吹先大夫錢應金註先生爾時諱斗光後更名道素性豪邁一見師輒折節請益師有開示語先大夫呈偈師稱善囑曰學道人當息却口頭三昧而求實悟又曰楞嚴經最有次第宜先看先大夫甞語承埏曰新建而前吾師潛溪楚石而後吾師蓮池兩浙靈秀盡萃於斯一代儒釋孰能過之師從念佛得力立說主東林淨土南山戒律乃著彌陀疏鈔戒疏發隱二書又編禪關䇿進葢顯禪淨雙修不出一心師之化權微矣甞垂語曰本朝第一流宗師無過於楚石和尚有西齋淨土詩一卷彼自號禪人而淺視淨土者非也乙卯夏六月晦日師預設供別眾七月己酉示微疾日當午命扶西向坐哆啝念佛端然而逝世壽八十一僧臘五十塔全身於五雲山之麓釋經輯古手著凡三十餘種總名雲棲法彚行世從上諸祖單提正令未必盡修萬行若夫即萬行以彰一心即塵勞而見佛性昔惟永明今惟雲棲而已師素誡眾貴真修勿顯異故諸靈異不具載上首弟子鵝湖廣心瓶匋廣印拂水廣潤暨廣寂廣承廣伸廣德大賢大真大掄大獻以下若而人參學如壽昌慧經雲門圓澄雙徑圓信博山大𫇣淨名大蓮三峯法藏等竝飲水知源者也贊曰維大雄氏分禪教律雲棲總持一門超出單提六字旋乾轉坤慈雲膚寸大地瀰淪達觀可禪師傳秀水寓公高承埏述師諱真可字達觀晚號紫栢學人稱為紫栢尊者吳江沈氏子生五歲不語有異僧過門摩其頂遂能言志氣雄放不可覊勒嘉靖己未年十七仗劒欲遊塞上至蘇州天雨宿虎丘僧舍聞僧夜誦八十八佛名遂解腰纏請明晨設齋剃度自是即脇不至席矣年二十從講師受具戒掩關於嘉善之景德寺三年遂行脚參知識究明大事聞僧誦張拙秀才偈云斷除妄想重增病趨向真如亦是邪大疑之一日齋次忽悟乃曰使吾在臨濟德山座下一掌便醒安用如何若何自是凌鑠諸方隆慶壬申師同陸文定樹聲參雲谷會公扣擊華嚴宗旨谷發揮四法界圓融之妙師歎為未曾有過匡山窮相宗奧義遊五臺空巖中老宿孤坐師問一念未生時如何宿豎一指又問既生後如何宿展兩手師言下有契萬曆癸酉至京師參暹法師於張家灣參理法師於千佛寺參笑巖寶公於西方庵末後乃至法通寺參徧融貞公融問來此作麼曰習講問習講作麼曰貫通經旨代佛揚化融曰你當清淨說法師曰即今不惹一塵融命褫師直裰施旁僧曰脫了一層還一層師心折之遂留掛搭觀其動履冥啟多矣未幾南還適聊城傅御史光宅為吳縣令其子利根甚黠慧搦二花問曰是一是二師曰是一根遽開手曰此花是二師何言一師曰我言其本汝言其末根遂作禮旋至嘉興見楞嚴寺久廢乃屬陸莊簡光祖馮祭酒夢禎包副使檉芳為外護而委弟子密藏開公鶴林蕖公興復之陸副使光祚助建禪堂先成師乃引錐刺臂血盈盌書警語曰若不究心坐禪徒增業苦如能護念罵佛猶益真修又念兩都大藏印造艱難且卷帙繁重更難於持行流通遐方僻壤有終不得聞佛法者改刻梵筴為方冊印行輕便普使見聞作金剛種子遂創刻於五臺山移於寂照庵至今徑山貯板楞嚴發經俾大藏傳播薄海內外皆師願力也丙戌訪憨山清公於東海牢山海印寺心相印契遂許生平再入京師復潭柘寺戒壇時徧融貞公已入滅師為文哭之有嗣德不嗣法語乃繇三晉歷關中跨棧道西遊峨嵋禮普賢大士順流下瞿塘過荊襄登太和憩匡廬重興歸宗古寺過安慶遊皖公山建佛光寺北至房山石經洞復晉靜琬法師塔院感琬公所藏佛舍利放光慈聖皇太后迎舍利入大內供三日重藏石窟神宗顯皇帝手書金剛經汗下漬紙疑當更易遣內侍質師師進偈曰御汗一滴萬世津梁無窮法藏從此放光神宗大悅慈聖皇太后聞師至命近侍致齋供賜紫伽黎師遜謝避暑上方山適憨山清公入都晤師於兜率院師復偕至雲居禮石經遂同住西郊園中對談四十晝夜目不交睫時萬曆壬辰秋七月也師既與憨山約往濬曹溪以通法脉癸巳歲先至匡山待之越二年乙未聞憨山以弘法罹難嘆曰法門無人矣即往探曹溪禮法供戒靈通侍者飲酒弔故檀越陳亞僊有詩偈法語將行赴京師救憨山適知其謫戍雷陽遂待於江滸仲冬相見於下關旅泊庵執憨山手曰公不生還吾不有生日憨山再三慰解之瀕別師囑曰吾他日即先公死後事屬公歲庚子南康知府吳寶秀浙江樂清人也有善政以礦稅被逮其夫人哀憤投繯死師在匡山聞之曰閹人橫行至此世道不可為矣乃決䇿入京師謂人曰憨山不歸我為法一大負礦稅不止我救世一大負傳燈錄未續我慧命一大負捨此一具骨釋此三負不復走王舍城矣越二年壬寅師於赭山會延慶寺忽自題其像曰這個阿師心直口快走遍天下圜中自在癸卯九月為預祝蓮池宏公明年七十偈冬十月妖書事起震動中外忌者乘之劾師下司宼獄及鞫訊師但以三大負對絕無他辭時曹御史學程在請室傾心問道有圜中語錄先大夫錢應金註先生爾時諱斗光後更名道素計偕至特進謁請室見其深慈定力殷勤接引謂有神光斷臂之風適有欲死師者師曰世法如此久住何為臘月戊戌索浴罷端坐說偈微笑而逝世壽六十一僧臘四十五越十三年丙辰冬憨山清公至徑山為師舉龕荼毗肉身儼然舍利無算塔於徑山之文殊臺有紫栢集行世師氣雄體豐面嚴冷心乃最慈戒律精嚴見地直截穩密足可遠追臨濟近接楚石從毗舍浮佛半偈悟徹親切示人居恒義重君親入佛殿見萬歲牌必致敬閱大統曆加額後覽偶讀長沙志見忠臣李芾殉城事淚直迸灑視侍者自若師訶曰當推墮汝於崖下其天性若此所至護持正法摧伏魔外入室弟子甚多而宰官居士尤眾先後興復十五古剎所刻大藏外訪求古尊宿語錄及經論註疏梓行者凡若干種贊曰巍巍紫栢法門荊聶抉面屠腸斬頭瀝血創方冊藏顯直指禪閃電不絕孤雲自還憨山清禪師傳秀水寓公高承埏述師諱德清字澄印別號憨山全椒蔡氏子七歲見叔母生子又見叔死即抱生死去來之疑年十二禮南京大報恩寺西林寧公為師趙文肅貞吉見之曰此子當為人天師也嘉興雲谷會公得法於法舟濟禪師與冬谿澤公齊名嘉靖甲子往來棲霞報恩每示學人曰古人終日喫飯不嚼粒米終日行路不踏寸地如是用心方有少分相應師執侍甚勤谷開示出世參禪悟明心地之妙師即請西林披剃盡焚所習外學偕雪浪恩公竝事無極湛公受具戒聽講華嚴玄談有省因以澄印為字歲乙丑雲谷集五十三人結坐禪期於大天界寺力拔師入眾同參谷指示向上一路教以念佛審實話頭從此參究一念不移隆慶己巳住靜金山二載辛未始辭谷北遊谷曰古人行脚單為求明己躬下事爾當思將何以見父母師友慎勿虗費草鞋錢也壬申至京師投宿河漕遺教寺往西山從摩訶庵忠法師聽妙宗鈔又聽法華唯識詣安法師為說因明三支比量參徧融貞公求指示融無語惟張目直視參笑巖寶公巖問何方來曰南方來巖曰記得來時路否曰一過便休巖曰子却來處分明師便作禮萬曆癸酉遊盤山至千像峯石室見不語僧遂與度夏明年偕妙峯登公請大藏歸山陰王府入少林禮初祖結冬邸中閱物不遷論至梵志出家頓了旋嵐偃嶽之旨於是生死去來之疑氷釋作偈曰死生晝夜水流花謝今日乃知鼻孔向下伏牛山法光禪師贈以偈且曰要公不捉死𧉮耳乙亥至北五臺禮文殊大士大方廣公厚禮之尋結茅五臺峯下之龍門匡山黃龍潭釋徹空至同居半載參鳳林寺二虎胤公虎甚器重丙子蓮池宏公復遊五臺與師語契為留旬日丁丑見南嶽發願文刺血書華嚴經辛巳仲冬慈聖皇太后為神廟建祈儲道場於五臺山大塔院寺期百有二十日師與妙峯主其事壬午八月光廟誕生師與妙庵禎公結隱太行山障石巖至京西中峯寺重刻中峯廣錄結冬水齋於石室癸未春即遁居東海之牢山豁悟楞嚴觀境因復那羅延窟道場始易號憨山慈聖再徵不得甲申乃得其所在輒賜內帑師倣古矯詔賑饑事以賑山東饑民丙戌慈聖頒藏經於東海布金造寺賜額海印達觀可公訪之盤桓二旬丁亥殿宇工竣始開堂為眾說戒己丑請藏至南京報恩寺感寶塔放光為二親營生壙壬辰七月訪達觀可公於京師對談四十晝夜偕過石經山禮釋迦文佛舍利禮石經於雷音寺禮琬公塔院癸巳山東又饑師以山中所儲齋供盡分贍邊山四社之民甲午冬說戒於京師大慈壽寺歲乙未方士流言侵攘逮赴詔獄按無實坐以私創寺院戍雷州衛達觀可公欲白其枉師止之為作逐客說贈師而別道出江西鄒忠介元標迎至鐵佛庵與師一言投機頓翻前案丙申春入曹溪禮六祖乃抵戍所寓城西古寺坡公亭雷州饑癘師掩骼埋胔以萬計乃建盂蘭會說幽冥戒天大雨癘隨止未幾建化城庵於電白縣西苦藤嶺施茶濟眾戊戌修曹溪通志成搆禪室於壁壘間倣大慧冠巾說法歲庚子始住錫曹溪為靈通侍者授戒歸侵田斥僦舍屠門酒肆蔚為寶坊緇白坌集攝折互用大鑑之道勃焉中興乙巳渡瓊海訪蘇東坡桄榔庵白龍泉求覺範禪師遺跡不可得為之慨然修五羊青門長春庵作曹溪廨院為六祖辦供冬十一月熹廟誕生恩詔開伍癸丑度嶺至湖東修衡州曇華精舍遊德山禮祖甲寅夏慈聖皇太后賓天詔至師返僧服乙卯禮南嶽直登祝融峯旋遊九疑山過冬於愚溪丙辰為花藥寺僧續法系過梅雪堂弔遜庵至武昌禮大佛遊九峯禮無念有公塔至潯陽遊東林有懷古詩登匡廬弔徹空避暑金竹坪遊歸宗寺登金輪峯禮舍利塔至黃梅禮四祖五祖塔遊浮江截江登九華禮地藏遂東遊浙江會塟達觀可公於徑山弔蓮池宏公於雲棲各為塔上之銘先大夫錢應金註高先生諱道素自雲棲歸謂承埏曰小子識之憨公師友死生之誼便非流輩所及豈俟弘法利生始見宗門龍象耶王邑宰在公語師曰昨覽楞嚴經八遍覺與昔時眼界不同師曰不要熱忙只管看來看去和經都不見了始得赴淨慈寺宗鏡堂說大戒名宿雲集遊靈隱三竺西山贊揚放生三池過嘉興棲真寺埽雲谷會公塔為傳以表之赴齋楞嚴東塔金明三剎瞻禮者數千人至吳門遊諸名勝諸大老問道於觀音山復迎至虞山拂水為三山緇白說戒於京口大徹堂丁巳返廬山建法雲寺於五乳峯下效遠公六時刻漏專修淨業天啟壬戌復住曹溪癸亥十月十一日示微疾沐浴焚香集眾告別顧曰今日截斷葛藤端坐而逝世壽七十八僧臘六十自夢遊集外有經論註解二十餘種行世師氣宇軒舉士大夫有志節者多與之遊張文端位曰人知憨師為大善知識耳不知有社稷功也達觀可公曰曹溪肉祖所現邇來曹源涸矣藉憨師以謫戍為波瀾而曹源復活為題康僧會尊者像寄之有康祖來吳憨公謫語其推重如此今上皇帝御贊師像云這老和尚何等行狀撐持法門已作棟梁受天子之鉗錘為佛祖之標榜後署御名供大內九蓮菩薩院中先是乙丑歲龕歸廬山五乳峯法雲寺塔而藏焉崇禎癸未人復奉其龕歸曹溪歷年二十端坐如生遂金漆塗體升座與六祖肉身相望就天峙岡舊塔院地供養名曰憨山院去南華寺半里許師每謂萬曆間五大師際會一時雖體用不同理事各別其所以扶樹宗教未甞不同途合轍爰作三銘二傳以備僧史三銘者蓮池宏公達觀可公暨壽昌無明經公二傳則妙峯雪浪也其上首弟子知微善若惺炯修六逸智海岸悟心融顓愚衡夜臺某雪嶺峻等數十人不具載師甞示雪嶺峻曰學道人第一要骨氣剛次要識量大次要生死心切嗚呼師生平亦盡此三言矣贊曰西林抽條柳巷脫木終返曹溪如雲赴谷機緣桴應文句鐘鳴全身說法不假三生雪嶠信禪師傳附前進士檇李遺老高承埏纂師諱圓信字雪嶠一字雪庭浙江鄞人也朱姓早失父母稍長聞彌蛇經言水鳥樹林皆念佛法僧忽心動萬曆己亥捨俗出家截髮上天台自號不空臥古祠乞食者二年無有入處一日逢靜主妙禎因參他心通僧勘少林僧三天竺來公案忽前後際斷說偈曰石貼背脊骨翻身脇肋骨子細思量來動也動不得復喝曰張三殺人李四償命自此遂能作偈欲返天台尋人印證正出雲門普濟寺舉頭見古雲門三字乃大悟作偈曰一上天台雲更深脚根踏斷草鞋繩比丘五百無踪影見得他時打斷筋向人索紙筆書之自此遂能書畵高塗大抹一洗前人印板法蔬笋氣而出以奇秀旋結茅武康之雙髻峯至龍池參幻有傳禪師一見把住曰佛不見身知是佛且置如何是若實有知別無佛龍池曰有了你沒了我師拓開龍池曰雪嶠不得老僧道師作禮進具戒至雲棲參蓮池宏禪師具陳行脚雲棲曰曾為浪子偏憐客一段苦心具見然所得拈向一邊百尺竿頭更須進步師呈偈雲棲逐句著語且曰見處高美更少作詩偈以頭陀行住雙髻峯續祖慧命師一日問百年後衣鉢付何人雲棲曰我無衣鉢無能付亦無受者師曰如此斷滅去也雲棲曰影也沒有斷滅個甚麼師曰請師授記雲棲曰諸佛授記多時也師曰不要這個葛藤雲棲大笑師拜別乞雲棲垂語令可以除可以進雲棲曰除去有所得心進到不可到處更加精進振雙髻之風次年復參龍池龍池豎一指師曰喚作什麼龍池休去又閱歲師著草鞋直入方丈龍池曰你草鞋猶未脫也師曰何處見我草鞋來龍池微笑師呈偈曰數載龍池三度登重重問話舌生氷草鞋分付虎狼去雙髻峯頭一箇僧龍池頷之甲寅春二月遂受記莂乙卯春雲棲示寂師為埽塔作偈有衣鉢山中問道流句是年始自雙髻遷雙徑結千指庵於東坡池上憨山清禪師會葬紫栢日過之機語契合題師真贊有打破金剛圈咬碎鐵栗棘之句復為作六妙銘珍重而別師又於山頂築語風居榜其門曰孤雲臥此中萬山拜其下予甞偕居士沈泓汪渢吳統持訪友天目山中過師雙徑見語風窓外千峯矗雲真絕境也師捫虱次聞谷印公曰慈悲些師曰直要箇箇見血顓愚衡公切菜次師曰作麼生曰刀刀到底師曰用許多力氣作麼曰你作麼生師曰一刀到底鴛湖用公翫新月次師曰者半箇在那裏去了湖良久曰會麼師曰也只得半箇木陳忞參密雲悟公于金粟機緣未契至雙徑謁師師問曾到金粟否曰曾到師曰曾問話否曰不曾師曰你怕打那曰某甲一向不曾置得問頭請師處借轉問頭師乃開示忞即轉金粟去師謂箬庵問曰我平日只教人誦金剛經曰多少人錯會大師意師曰直饒不錯會大遠在曰大師莫瞞人好師瞠目視之師清真孤上傲然自得每振吼曼嘯不束縛沙門威儀人稱雪獅子晚遂號青獅翁世衰法微深自保護影不出山者三十年崇禎庚辰壽昌弟子黃禮部端伯博山弟子余巡撫大成請開堂徑山興聖萬壽寺是年師正七十矣自此說法數大剎浹月即歸其久者則廬山開先而已師瞥見古雲門得悟發願欲弘雲門宗所至拈匡真偃禪師香癸未春上天童為密雲悟公封塔說偈曰坐空千界月諸佛汝同儕鑿破青山面將身就活埋事竟謂費隱容木陳忞石奇雲等曰佛法傳持子孫綿遠如帝珠網各自領會去旋至龍池埽塔有偈曰銅棺山下養龍池步入凉風覓我師當戶娑羅空腹樹迎階芳草昔人眉追思滴血曾留偈會寫傳燈嗣法詩今日塔前成九頓源流千載繼孫兒是秋住我邑東塔寺瓣香之祝始嗣龍池葢甞有五月盤桓也示眾曰禪和子行脚住山須求箇本命元辰著落豈是散心雜話念栢樹子過日的直饒你念得熟如瓶瀉水卓然無依你作麼生出身參禪惟貴妙悟古人不遠千里見人三登投子九上洞山逃他一片苦心不過自然草鞵繩斷頂門眼開盡大地方知是我更無別物祖師云舉足掉臂無非西來大意不是妄語丙戌住紹興雲門寺明年秋師頻唱鵝毛雪兒滿空飛眾訝之中秋示微疾即封鐘板曰吾將去矣郭居士問囑累何人師曰此道塗污甚今日棧絕之書偈曰小兒曹小兒曹生死路上須逍遙皎月氷霜曉喫杯茶坐脫去了八月二十六日酉刻索茶一盃師隨唱雪花飛句端然坐逝壽七十七臘四十九塔全身於雲門之前崗所著有語錄懷淨土詩行世是為南嶽下三十三世入室弟子徹崖歇形山淖惟一潤曹源金石濤鎧山鳴璐先後主叢林法席贊曰雲棲滴雨雲門灑雪波興龍池超然獨絕書𦘕逸品禪亦如斯一丘一壑自謂過之附三大師傳贊䟦語癸未冬月先大夫歸自寶坻將之涇縣因念先世禪喜作雲棲紫栢憨山三大師傳贊以續八十八祖繕錄於甲申下元序及雪嶠老人復有函葢之契未幾而雪公化去先大夫更為著語以續三大師又未幾而先大夫離憂感疾遂棄諸孤余小子既不忍遺忘手澤且言念趨庭之暇曾執侍雙徑巾瓶是我家祖孫父子總在諸善知識光影中重重現出也因流涕稽首而敬述之順治辛丑仲春日秀水高佑釲念祖敬識於稽古堂附又䟦曹溪憨山大師剃度于嘉靖甲子甫十九耳聽無極和尚講華嚴玄談至海印森羅常住悟法界圓融之旨慕清凉之為人因自命其字曰澄印萬曆癸酉遊五臺求清凉傳按跡遊之至北臺見憨山奇秀默取為號詩以志之有遮莫從人去聊將此息機之句歲戊寅書華嚴經則刺血蘸黃金作供養血瀝盡弗顧以此感種種瑞夢或夢入金剛窟親承清凉開示或夜登兜率天入樓閣覲彌勒聆轉識成智大義或夢覲文殊召入浴堂從不淨得大清淨歲辛巳慈聖太后命建祈儲道場於五臺適大塔院寺修舍利塔成即以金書華嚴安置塔藏明春升座講玄談聽者萬眾偶見清凉疏菩薩住處東海那羅延窟此云堅牢即今之牢山癸未夏訪至其地於山南觀音庵廢墟誅茅結廬以隱迨太后以祝之勞布金造寺賜額海印而師之初機已在隱現間晚年結晚廬山五乳峯下每念華嚴一宗清凉乃此方撰述之祖世多懼疏鈔之繁廣而但宗合論奚可哉因取疏文挈提大旨名曰華嚴綱要至天啟壬戌而書成遂重入曹溪越明年示寂矣師夙參請雲谷笑巖二老高超義學直趨最上故能酌曹溪滴水化為法雨溉被枯禪乃宗教互融恒露其初機而縱橫涌出其始終證入似獨契華嚴宗旨亦猶清凉為六祖法孫而卒稱華嚴四祖云爾佑釲讀先大夫三大師傳竊謂雲棲似永明紫栢似覺範而憨公則清凉幹子圭峯益友也外舅譚公埽菴首肯斯言請再質之諸方具眼康熈丁未冬秀水高佑釲念祖敬識於金陵報恩寺
