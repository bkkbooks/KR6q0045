body:
  text: 匡廬憨山釋德清述秀水寓公高承埏補嘉興上士錢應金較青原思禪師傳吉州青原山行思禪師本州安城劉氏子幼出家每羣居論道師惟默然後聞曹溪往參問曰當何所務即不落階級祖曰汝曾作甚麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之居衆首焉一日祖謂師曰從上衣法雙行師資遞授衣以表信法乃印心吾今得人何患不信吾受衣以來遭此多難況乎後代爭競必多衣即留鎮山門汝當分化一方毋令斷絶師既得法歸住青原六祖將示滅有沙彌希遷問曰和尚百年後希遷未審當依附何人祖曰尋思去及祖順世遷每于靜處端坐寂若忘生第一座問曰汝師已逝空坐奚為遷曰我稟遺命故尋思耳座曰汝有師兄思和尚今在吉州汝緣在彼師言甚直汝自迷耳遷即禮辭祖龕直詣青原參禮師曰子何方來遷曰曹溪師曰將得甚麼來曰未到曹溪亦不失師曰若恁麼用到曹溪作甚麼遷曰若不到曹溪爭知不失詰勘多端機辨自在遂印為法嗣是為曹溪下一世贊曰天然尊貴不落階級一語投機如蜂得蜜曹溪一脉枝分派衍從此兒孫雷驅電捲南嶽讓禪師傳南嶽懷讓禪師者金州人也姓杜氏生時白氣應于玄象太史占奏為國之法器帝勑金州太守親慰其家年十歲有異僧見之告其父母曰此兒出家必獲上乘年十五辭親依荊州玉泉寺弘景律師出家授具後謁嵩山安和尚指詣曹溪參六祖祖問甚麼處來曰嵩山來祖曰甚麼物恁麼來師無語遂經八載忽然有省乃白祖曰某甲有個會處祖曰作麼生師曰說似一物即不中祖曰還假修證否師曰修證則不無染污即不得祖曰祇這不染污的諸佛之所護念汝善護持西天般若多羅讖汝足下出一馬駒踏殺天下人竝在汝心師執侍一十五年後往衡嶽有沙門道一在山常習坐禪師知是法器乃取一磚于庵前石上磨一曰磨作甚麼師曰作鏡一曰磚豈得成鏡耶師曰磨磚不得成鏡坐禪豈得做佛一曰如何即是師曰如牛駕車車若不行打車即是打牛即是一大了悟遂付其法偈曰心地含諸種遇澤悉皆萌三昧花無相何壞復何成是為曹溪下一世贊曰氣槩冲天心虗沒量攬曹溪水興波作浪睡著馬駒一磚打起蹴踏橫行觸者皆死永嘉真覺禪師傳永嘉無相大師者諱玄覺永嘉人姓戴氏丱歲出家遍探三藏精天台止觀圓妙法門于四威儀中常冥禪觀後因左溪朗禪師激勵與東陽䇿禪師同詣曹溪初到振錫携瓶繞祖三匝祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢師曰生死事大無常迅速祖曰何不體取無生了無速乎曰體即無生了本無速祖曰如是如是于時大衆無不愕然師方具威儀參禮須臾告辭祖曰返太速乎師曰本自非動豈有速耶祖曰誰知非動曰仁者自生分別祖曰汝甚得無生意師曰無生豈有意耶祖曰無意誰當分別師曰分別亦非意祖歎曰善哉善哉少留一宿時謂一宿覺矣䇿公乃留師翼日下山回溫江學者輻輳號真覺諡無相大師著禪宗修悟圓旨名永嘉證道歌是為曹溪下一世贊曰金錫孤標生龍活虎不是老盧幾遭輕侮言前薦得一宿便行縱然超越猶是兒孫一行禪師傳一行禪師巨鹿人姓張氏丱歲不羣博洽記誦讀書不再覽初從嵩山普寂禪師乃悟世幻遂禮出家剃染受具嘗傳密教于金剛無畏結集毗盧遮那經疏登壇灌頂受瑜珈五部法又尋究于陰陽讖緯之書訪算法于天台國清寺異僧盡得其蘊自此聲名藉甚開元三年詔入見咨出世道及安國撫民之法對稱旨號稱天師以國為問答曰鑾輿有萬里之行社稷終吉以金盒進曰至萬里即開視乃當歸少許耳後祿山作亂上幸成都至萬里橋悟當歸之讖灑然忘憂終吉者至昭宗而絶昭宗曾封吉王也開元九年朝廷以曆不驗詔師改撰新曆師推大衍曆書五十二卷入唐書律曆志先是有邢和璞者道術人也謂尹愔曰一行和尚真聖人也漢洛下閎造曆時云八百年差一日當有聖人定之大衍曆出閎言驗矣開元十一年師製水渾天儀成古未之有也師嗣北宗普寂又以學灌頂故為密宗五祖贊曰顯密之宗讖緯之故大衍一成陰陽合度世出世法靡不該練五地之行于師乃見江西馬祖一禪師傳江西道一禪師漢州什邡縣人姓馬氏本邑羅漢寺出家容貌奇異牛行虎視引舌過鼻足有輪文幼依資州唐和尚授具開元中習禪定于衡山遇讓和尚密授心印後開法于江西四方學者雲集師一日謂衆曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又以楞伽經文印衆生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不取惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提妙果亦復如是于心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈言心地隨時說菩提亦秖寧事理俱無礙當生即不生是為南嶽下一世座下開悟弟子一百三十餘人出世者七十六人禪道東來自此為最盛贊曰馬駒如龍牛行虎視百三十人一腳踏地法流西江百川東倒一滴瀰漫潤茲枯槁石頭遷禪師傳石頭希遷禪師端州高要陳氏子母初懷妊不喜茹葷師生在孩提不煩保母既冠然諾自許鄉峒獠民畏鬼神多淫祀殺牛釃酒習以為常師輒往毀叢祠奪牛而歸歲盈數十鄉老不能禁後直造曹溪得度屬祖圓寂稟遺命謁青原乃攝衣從之一日原問曰有人道嶺南有消息師曰有人不道嶺南有消息原曰若恁麼大藏小藏從何而來師曰盡從這裡去原然之師久參既得心印即往衡山南寺之東有石如臺乃結菴其上時號石頭和尚師看肇論至會萬物而為己者其惟聖人乎師乃拊几曰聖人無己靡所不己法身無相誰云自他圓鑑靈照于其間萬物體玄而自現境智非一孰云去來至哉斯語也遂掩卷不覺寢夢自身與六祖乘一龜游泳深池之內覺而詳之靈龕者智也池者性海也吾與祖師同乘靈智遊性海矣遂著參同契發明禪宗之旨是為青原下一世贊曰獦獠佛性元自有因一尋師去即得其真踞坐石頭其路甚滑縱能行者也喫一踏清凉澄觀國師傳清凉國師諱澄觀山陰人姓夏侯氏出家于應天寺十四得度學律于棲霞受菩薩戒于常照傳涅槃起信論法界觀還源記于瓦棺造東京受雜華于大詵從荊溪習止觀法華維摩等疏謁牛頭忠徑山欽咨決南宗心印謁慧雲明了北宗玄理此土儒墨老莊諸子竺乾諸部異計四韋五明顯密儀範莫不旁通博綜巡禮五臺瞻瑞相居大華嚴寺專行方等懺法講華嚴大經造新疏鈔後居京師德宗召講內殿謂以妙法清凉朕心賜號清凉法師為教授和尚譯華嚴新經帝親御譯場元和五年憲宗問華嚴法界宗旨豁然有悟勑有司鑄金印賜號大統清凉國師師身長九尺四寸垂手過膝目夜發光晝仍不瞬日記萬言七行俱下才供二筆盡形一食宿不離衣為七帝門師去賢首百餘年遙稟其旨所著疏記四百餘卷講華嚴經五十遍壽一百二歲是為華嚴四祖贊曰秉大智印範圍法界入總持門具四無礙九尺長軀百年住世七帝門師事不思議天皇悟禪師傳天皇道悟禪師婺州東陽張氏子神儀挺異幼而生知年十四懇求出家父母不聽遂損減飲膳日才一食形體羸悴父母不得已而許之依明州大德披剃受具精進梵行推為勇猛或風雨昏夜晏坐丘冢身心安靜離諸怖畏首謁徑山國一受心法服勤五載後參馬祖重印前解依止二夏乃謁石頭問曰離却定慧以何法示人頭曰我這裡無奴婢離箇甚麼曰如何明得頭曰汝還撮得虗空麼曰恁麼則不從今日去也頭曰未審汝早晚向那邊來曰道悟不是那邊人頭曰我早知汝來處也曰師何以贓誣于人頭曰汝身現在曰雖然如是畢竟如何示于後人頭曰誰是後人師從此頓悟罄前二哲匠所傳後住郡之左天皇寺石頭法道大行是為青原下二世贊曰那邊不住從何處來一見石頭八字打開以此示人只貴知有顛倒拈來如弄丸手大珠海禪師傳越州大珠慧海禪師建州朱氏子依越州大雲寺智和尚受業初參馬祖祖問從何處來曰越州大雲寺來祖曰來此擬須何事曰來求佛法祖曰我這裡一物也無求甚麼佛法自家寶藏不顧拋家散走作麼曰阿那箇是慧海寶藏祖曰即今問我者是汝寶藏一切具足更無缺小使用自在何假外求師于言下自識本心不由知覺踊躍禮謝執侍六載後以受業師老遽歸奉養乃晦跡藏用外示癡訥撰頓悟入道要門一卷是為南嶽下二世贊曰自持寶藏更向他求一言指出應用自由越有大珠圓明光透隨方照耀不落窠臼黃檗運禪師傳洪州黃檗希運禪師閩人也幼于本州黃檗山出家額間隆起如珠音辭朗潤志意冲淡後遊京師因人啓發乃往參百丈丈問巍巍堂堂從何來師曰巍巍堂堂從嶺南來丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示丈良久師曰不可教後人斷絶去也丈曰將謂汝是箇人乃起入方丈師隨後入曰某甲特來丈曰若爾則他後不得孤負吾丈一日問師甚麼處去來師曰大雄山下採菌子來丈曰還見大蟲麼師便作虎聲丈拈斧作斫勢師即打一摑丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口裴相國鎮宛陵一日請師至郡以所解一篇示之師接置于座略不披閲良久曰會麼裴曰未測師曰若恁麼會得猶較些子若也形于紙墨何有吾宗裴乃贈以詩有擬欲事師為弟子之句自後請益為說黃檗心要自爾黃檗門風盛于江表矣是為南嶽下三世贊曰大雄山下有一大蟲哮吼一聲聞者耳聾疾雷之機掣電之眼西來門風從此太險溈山祐禪師傳潭州溈山靈祐禪師福州長溪趙氏子年十五出家依本郡建善寺法常律師剃髮于杭州龍興寺究大小乘教二十三遊江西參百丈一見許之入室遂居參學之首侍立次丈問誰師曰某甲丈曰汝撥爐中有火否師撥之云無火丈躬起深撥得少火舉以示之曰汝道無這箇聻師由是發悟禮謝陳其所解丈曰此乃暫時岐路耳經云欲識佛性義當觀時節因緣時節既至如迷忽悟如忘忽憶方省己物不從他得故祖師云悟了同未悟無心亦無法祇是無虗妄凡聖等心本來心法元是備足汝今既爾善自護持師一日上堂云老僧百年後向山下檀越家作一頭水牯牛右脅下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作甚麼即得仰山出禮拜而退從此稱為溈仰宗機緣甚多是為南嶽下三世贊曰百丈壁立來者望崖惟師直入撥火心開作水牯牛異類中行仰山勘破父子家聲圭峯密禪師傳圭峯禪師諱宗密果州人姓何氏世業儒憲宗元和二年將赴貢舉偶值遂州道圓禪師法席味其道法遂求披剃授具一日隨衆僧齊于府吏任灌家居末座以次授經得圓覺十二章誦未終軸感悟歸告于圓圓曰此經諸佛授汝耳汝當大弘圓頓之教汝行矣無滯一隅遂辭去謁荊南忠禪師洛陽照禪師皆蒙印可抵襄漢因病僧付華嚴疏即上都清凉觀大師之所撰也覽之欣然曰吾禪遇南宗教逢圓覺一言之下心地開通今復得此大法吾其幸哉遂講之以未見清凉乃以書遙敘門人之禮清凉印曰毗盧性海與吾同遊者舍汝其誰歟轉輪真子可以喻也文宗詔入內賜紫衣帝纍問法要朝士歸慕惟裴相休深入堂奧受教為外護師以禪教學者互相非毀乃著禪源詮及圓覺華嚴金剛起信唯識法界觀行願品諸經論疏鈔及道場修證儀凡九十餘卷是為華嚴五祖贊曰萬里封侯投筆而取吾師一投直出生死性海同遊真子之印入法界門是稱亞聖臨濟義玄禪師傳鎮州臨濟義玄禪師曹州邢氏子幼負出塵之志及落髮授具初參黃檗問如何是佛法的的大意問聲未絶檗便打如此三度問三度痛打師不契遂辭去檗曰不須他去秖往高安灘頭參大愚必為汝說師到大愚處愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗恁麼老婆心切為汝得徹因更來這裡問有過無過師于言下大悟乃曰元來黃檗佛法無多子愚搊住曰這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見箇甚麼道理速道速道師于大愚脅下築三拳愚拓開曰汝師黃檗非干我事師辭回黃檗檗見便曰這漢來來去去有甚了期師曰只為婆心太切檗曰甚處去來師曰昨蒙指示往參大愚去來檗曰大愚有何言句師舉前話檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌檗曰這風顛漢來這裡捋虎鬚師便喝檗喚侍者引這風顛漢參堂去從此禪宗機鋒迅捷自師始為臨濟宗南嶽下四世贊曰黃檗師子爪牙才露大愚之機如鷹拿兔脅下三拳腮邊一掌適犯其鋒非為粗莽洞山價禪師傳瑞州洞山良價悟本禪師會稽俞氏子幼歲出家從師念心經至無眼耳鼻舌身意處忽以手捫面問師曰某甲有眼耳鼻舌等何故經言無其師駭然異之曰吾非汝師即指往五泄山禮默禪師披剃年二十遊方初參溈山舉忠師無情說法話請益溈為開示不契乃指往參雲巖師遂辭徑造雲巖舉前話問無情說法該何教典巖云豈不見彌陀經云水鳥樹林悉皆念佛念法師于此有省乃述偈曰也太奇也太奇無情說法不思議若將耳聽終難會眼處聞時方得知師參久一日辭巖問曰百年後忽有問還描得師真否如何抵對巖良久云秖這是師沈吟巖曰價闍黎承當箇事大須審細師猶涉疑後因過水覩影大悟前旨有偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方始契如如厥後盛化于豫章高安之洞山權開五位善接三根大闡一音廣弘萬品橫抽寶劒剪諸見之稠林妙叶弘通截萬端之穿鑿又得曹山深明的旨妙唱嘉猷道合君臣偏正回互于是天下共推為曹洞宗是為青原下四世贊曰本來面目一摸便見無情說法似乎還缺既見雲巖掀翻窠臼過水覩影方始通透曹山寂禪師傳撫州曹山本寂禪師莆田黃氏子少業儒年十九出家登戒尋謁洞山山問闍黎名甚麼師云本寂山云那箇聻師云不名本寂山深器之自此入室盤桓數載山密授洞上宗旨遂辭去往曹溪禮祖塔回宜黃衆請開法師志慕六祖遂以所住之山名曹法席大興學者雲萃洞上之宗至師為盛師因僧問五位君臣旨訣師曰正位即空界本來無物偏位即色界有萬象形正中偏者背理就事偏中正者捨事入理兼帶者理事混融冥應衆緣不墮諸有非染非淨非正非偏故曰虗玄大道無著真宗從上先德推此一位最妙最玄當詳審辨明君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶語師又曰以君臣偏正言者不欲犯中故臣稱君不敢斥言是也此吾法宗要乃作偈曰學者先須識自宗莫將真際雜頑空妙明體盡知傷觸力在逢緣不借中出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終故應機之際語忌十成機貴回互此曹洞宗旨也為青原下五世贊曰越格之資不存名跡超方之眼一見便識五位虗玄宗旨綿密是故至今猶黑似漆鳥窠道林禪師傳杭州鳥窠道林禪師本郡富陽人也姓潘氏母朱氏夢日光入口因而有娠及誕異香滿室遂名香光九歲出家二十一于荊州果願寺授具後詣長安西明寺復理法師學華嚴經起信論理示以真妄頌俾修禪那師問曰初云何觀云何用心理久而無言師三禮而退後南歸參徑山國一禪師發明心地因見秦望山有長松枝葉繁茂盤屈如蓋遂棲止其上故時人謂之鳥窠禪師白居易侍郎出守茲郡因入山謁師問曰禪師住處甚危險師曰太守危險尤甚白曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作衆善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十翁翁行不得白作禮而退是為四祖下旁出第八世贊曰乘日光來依自性住故才出頭天然妙悟巢居長松人道是險但看他人不自簡點雪峯存禪師傳福州雪峯義存禪師泉州曾氏子家世奉佛師生惡茹葷于襁褓中聞鐘梵之聲或見幡花設像為之動容年十二從其父遊莆田玉㵎寺見慶玄律師遽拜曰我師也遂留侍焉落髮授具久歷禪會參德山問從上宗乘學人還有分也無山打一棒曰道甚麼曰不會至明日請益山曰我宗無語句實無一法與人師因此有省巖頭聞之曰德山老人一條脊梁骨硬似鐵拗不折然雖如此于唱教門中猶較些子師與巖頭同參深得切磋之力師與頭同辭德山山問甚麼處去頭曰暫辭和尚下山去山曰子他後作麼生頭曰不忘山曰子憑何有此說頭曰豈不聞智過于師方可傳授智與師齊減師半德山曰如是如是當善護持師同禮拜而退後回閩中開法于雪峯常教學人危坐如枯木杌時號為枯木堂後出雲門法眼二宗青原下五世贊曰熟處難忘蔬笋習氣鐘梵經聲聞之心醉師棒如龍友嘴如鐵故此出身自然超越附録雲門偃禪師贊嗣法雪峰才見睦州閉門推出挨身一拶頓折一足從此轉身蓋天蓋地雪峯未見早已心契法眼益禪師贊嗣法羅漢桂琛琛嗣玄沙師備備嗣雪峰一切現成了無顧佇萬象之中堂堂獨露一味平懷目前即是才落思惟便落第二
