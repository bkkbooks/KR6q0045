  text: 重編八十八祖道影傳贊序諸祖道影八十有八國初自大內傳寫安奉金陵之祖堂萬曆甲申紫栢大師得新安丁南羽臨寫三堂散置名山乙卯憨山大師更臨小冊各為傳贊以繫其後崇禎壬申嘉禾錢仙上鋟板以行其傳贊之文止七十有七缺者十一歲甲申予同年生𭬥李高寓公虞部為撰補十一篇又以雲棲紫栢憨山三大師益之甫謀鐫布以變中止今歲秋與寓公長君念祖再晤廣陵出其稿示予欲付剞劂以竟先志予力贊其決念祖因以一言請夫是編之從來與其所以利益于世羣公言之詳矣予奚以益哉抑聞古聖賢之所以垂訓于世者有言有心而更有身言屬書為教心屬道為宗不讀其書道不可得聞也即盡讀其書道未必遂聞也求道于言而子已有予欲無言之說則言不足恃求道于心而釋又有覓心了不可得之說則心亦未易恃然則釋之蘄進于佛與儒之蘄進于聖賢者將安所從事哉亦求諸其身而可矣傳之云者即其人之行以存其人之道也孔子云吾無行而不與二三子者孟子云服堯之服誦堯之言行堯之行是堯而已夫古聖往矣而其身之閱歷與其所以入道而進德者其跡不與俱往故讀鄉黨篇而孔子之所以聖可得而師也讀孟子七篇而子輿氏之所以賢可得而師也推之邵周程張朱陸諸大儒誠即其書稽其言考其行其人之所以不愧聖賢者亦皆可得而師也今茲八十八祖之中西天之祖師東土之教外別傳曹溪以下五宗之傳燈旁出其間若禪師若教主若戒律若淨土以至慈恩賢首天台瑜珈之諸宗不一然其傳心嗣法與其行解之卓然可述者于是乎備矣誠由諸傳而尋繹之觀其所以出世則超越者可師也觀其所以治心則精純者足法也今有腰石任舂利刀斷臂之猛以求師則罔不誠矣有三登投子九上洞山之勤以質學則罔不徧矣有章安五載雪被氷牀之寂以栖山則罔不安矣有天台九旬鳥巢衣襵之靜以安禪則罔不遺矣有臨濟築拳斷崖奪拂之利以當機則罔不超矣有蓮池憨山之晝夜念佛課六萬聲永明之持誦法華萬三千部以脩淨業則罔不辦矣有道林之鳥窠松雪峰之枯木杌高峰之死限三年千巖碧峰紫栢之脇不至席以冥心入悟則罔不徹矣學者惟志之弗立耳如有志高蹤逸軌無所取之取諸此足也若夫撥火而悟生觀影而疑釋或言句之盡捐或心法之雙泯則孔氏有不能私之于伯魚釋迦有不能遽授之阿難者諸祖奚為而傳與贊又奚為也吾度今之從事于道者儒未必皆顏淵釋未必皆雲門趙州丹霞其人也則亦語其常焉而已抑是編緣起紫栢大師肇之憨公廣之錢仙上承之寓公父子終之其功于諸祖一也然其自大內以入祖堂實在洪武戊申而紫栢大師之臨寫寓公之續傳其歲皆在甲申是書之成遂與國運相終始矣異哉念祖之竟厥先志其亟誠宜而以成明三百年梵典一大異書繫不尤重耶康熈庚戌秋九月望日旴江荷山髯僧徐芳題又題高氏父子八十八祖傳贊序䟦予觀高工部寓公序考竅精詳敘次有法其長君念祖䟦援引透切不厭煩賾大意俱在剖破諸宗之籓籬使同歸于圓通法海立論至平至正每念尼山苦縣猶龍見稱慧遠靜修虎溪時過古聖眼濶心虗殊途同歸毫無彼此崖異之見後世不窺本源空持門戶不但儒釋分疆有若敵國甚至朱陸之同宗孔孟而彈射交加洞濟之竝出曹溪而干戈迭樹亦見其胸眼之淺而隘也得高氏父子之論可以嗒然返矣高寓公虞部補憨大師八十八祖道影傳贊敘如來出世最初轉四諦法輪最後付別傳妙心教分五時戒合七眾至淨土一門則佛法已滅猶閱千年有能識阿彌陀佛四字者皆據高座葢慈憫眾生曲垂方便若論此事間不容髮靈山話月曹溪指月皆為添足盡天下善知識全體作用未有當頭道著者豈可於夢幻法中更分高下耶八十八祖真儀出自大內供於祖堂紫栢尊者廣之憨山大師傳而贊之高寓公虞部補之禪宗教律密淨諸門備矣菩薩護念以眾生故門門皆闢不專一路而於各門中容有未備有像則設偶爾成文無像不補終非揑合正得法海波瀾之妙寓公令嗣念祖過凌江出示因得卒讀而敘其意念祖家世為吾法金湯流通此書即以顯其先人廣大願力如來謂生菩薩家為世間最難則其於菩薩家繼志述事夙因所會有不期然而然者予於高氏不能不深生歎仰也康熈壬子長夏丹霞今釋題於龍護園重編憨山禪師八十八祖傳贊序吾友錢而介曾刻八十八祖傳贊余簡之止七十有七意未釋然因至海鹽鷹窠頂寺禮諸祖像及憨公手書傳贊其有像無傳者則雪巖欽無用寬鐵山瓊斷崖義絕學誠季潭泐松隱然無一全本空照大滿大以及慧約國師也亟為補綴成書編次四卷西天祖師二十七人又旁出一人東土應真則康居會佛圖澄寶誌公三人教外別傳凡四十有四人自初祖傳至六祖又四祖下旁出鳥窠一人五祖下旁出者一行傳瑜珈密宗六祖下旁出者永嘉傳天台宗清涼圭峯傳賢首宗其得六祖真傳者青原南嶽二甘露門南嶽二十五人未分宗派時四溈仰一臨濟二十內中峯兼傳淨土青原九人未分宗派時亦四曹洞雲門各二法眼一永明兼傳淨土又未詳嗣法者無一本空大滿三人教主凡十有六人淨土則遠公法照合永明中峯而四台宗則灌頂法智合永嘉而三賢首則法藏合清涼圭峯而三密宗則不空合一行而二慈恩則玄奘窺基而二律師則鍾山惠約及南山道宣而二凡有志于教與禪者庶幾因憨公傳贊見諸祖之道影即恍得諸祖之心印乎至憨公甞贊雲棲紫栢及自為贊余各纂小傳附其後庶見聞者知古今人不相遠也噫憍陳如暨二十七祖外東土僅六十人耳而十五人為浙產若律宗之惠約若賢首之清凉若台宗之灌頂永嘉法智若禪宗之天皇鳥窠若曹洞之始祖若法眼之永明若雲門之振宗若臨濟之雪巖中峯斷崖千巖全室亦可謂彬彬盛矣且季漢延熈時康僧會肇造三寺于孫吳境內為建業之建初太平之化城與我郡海鹽金粟山之廣慧實江南梵剎之始唐會昌四年黃檗運建我郡水西寺大中元年又建祥符寺後梁雪峯存隱我郡之真如手鑿一井其泉甘冽今在寺中梁天監間寶誌公于許玄度宅址建開善資寶寺在今蕭山達磨尊者開基之證果寺在今湯溪而靈芝之佛印臯亭之黃龍徑山之佛鑑天目之高峯松隱並開法杭境又紹之大雲寺更有大珠慧海而法藏曾禮四明阿育王舍利墖一行亦曾訪算法于天台國清寺異僧溈山參方則在杭州龍興寺是兩浙尊宿且有二十九人豈諸方得同日而語哉書成之十年陳尚書秋濤年伯先父玄期府君已未同榜也于曹溪錄示憨公原稿為陳如尊者及三十三祖道影贊為諸祖道影略傳贊四十有八而婁約以下十一公仍闕惟別見雲門法眼及傅大士白雲覺四贊以無像故置之或曰獨不念及二宗始祖乎余謂佛教初流東土譯經圖像建立塔寺剃度僧尼實始于啟道圓通法師摩騰三藏而竺法蘭偕至洛陽受戒講經及西遊取經實始于穎川沙門朱士行而法顯繼踰葱嶺以至律宗之始法時天台宗之始慧文賢首宗之始法順瑜伽密宗之始金剛智咸不得與蓮宗之祖慧遠禪宗之祖達磨慈恩宗東土之祖玄奘同見集中者正以傳贊一視祖堂道影道影所無傳贊遂不得而有也且楚石琦公為本朝第一流宗師偶以祖堂無像遂爾傳贊闕如原未甞以此為軒輊夫復何疑曹溪所錄憨公諸祖道影後語與題辭逈異因並存之道影今供養鷹窠頂寺前有董尚書思白書覺影相承四大字而金粟密雲悟公亦書其端云認影迷頭則昧先覺覺後覺一折一攝妙旨泠然徑山雪嶠信公序及陳徵君眉公記是又網魚弋兔不惜筌蹄者也賜同進士出身工部尚書郎前遷安寶坻涇縣令蒙溫旨敘功紀錄旌異𭬥李寓公高承埏澤外父纂時崇禎閼逢涒灘之歲良月糓旦諸祖道影傳贊題辭諸祖道影八十八尊向聞藏大內國初寫傳安奉南京祖堂萬曆甲申中達觀禪師勸丹陽弟子賀氏請丁雲鵬名筆臨寫三堂散置名山其二送五臺峨眉其一送南嶽者儀部金簡曾公請歸湖東予度嶺之南嶽寓湖東乙卯秋兵憲吳公同大參馮公過訪因設像瞻禮吳公大生歡喜欲臨小冊以便隨奉適遇荊門丹青史宷公命摹寫予因得一冊比欲為傳贊未能也及予投老匡山之四年庚申徂夏以舊嬰溼疾舉發痛不可忍藥石無効無可抵者乃考傳燈統記諸書纂為小傳各系以贊力疾書之凡一舉筆寂爾忘身不知所痛及冬方完其痛亦止以此未必不仗諸祖法力加持也吳公諱中偉號生白馮公諱時可號文所併記之以曉來者萬曆四十八年歲次庚申冬十月朔匡山逸叟憨山沙門釋德清書時年七十有五題諸祖道影後諸祖乃傳佛心印之宗師也憶昔世尊說法靈山甞隨弟子千二百五十人及佛末後拈花迦葉破顏微笑遂傳心印為教外別傳之旨是為禪宗二十八代至達磨大師遠來東土六傳而至曹溪下有南嶽青原以分五宗由梁唐至宋元得一千八百餘人皆世挺生豪傑之士塵垢軒冕薄將相而不為故歸心法門一言之下了悟自心使歷劫生死情根當下頓斷遂稱曰祖豈不毅然大丈夫哉嗟此末世去佛時遙既不預靈山嘉會而此土諸祖出世又不能親近入室故沉迷至今而不返者亦可悲矣久聞大內藏有歷代諸祖道影新安高士丁雲鵬者丹青之妙不減僧繇道子偶得內稿本八十八尊達觀禪師命畫四堂其一置西蜀峨眉其一置金陵祖堂其一置匡山五乳一置南嶽曾儀部金簡居士請歸湖東觀察備兵吳公生白一日過訪隨喜見而歎曰此真光明幢也會荊門畵士史宷善肖像遂命臨一冊竊觀公丰采高遠有翩翩出塵之度故望影而歸命葢亦曾親近入室中來昔裴休見壁間高僧真儀問黃檗曰真儀可觀高僧何在檗呼曰裴休休應諾不覺愕然遂大悟予想公夙種般若深根悟心不在裴丞相後故為集諸祖略傳各為贊以致公將為家傳心印也憨山釋德清述祖師傳贊序有佛處不得住無佛處急走過此宗門一關也若欲寫影圖形表裏相似如砂石掬之成金暫時遊戲具耳安能磨洗佛祖光明授殘箋眉目者哉䟦之詠之昔時今時許弄管成文章始得譬日月濶步虗空大開局面照徹四禺天上天下何人敢撮摩其冷暖乎檇李雁道人錢而介手書憨山老人八十八祖傳贊同其仲竹居士募諸士而梓之以傳布天下名山噫是傳諸老之心耶抑傳諸老之影耶若道傳如第二月即非真月若道不傳月落萬川處處皆圓雖然憨道人書之于冊雁道人書之于板真手不壞真性不滅竹居士倡之高寓公孫䱷公眾居士和之福與慧雙施與寫埒矣經云若有人以七寶滿恒河沙數布施若有人以恒河沙等身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說諸老直欲傳心如來不作誑語也徑山釋圓信題又序余刻祖師傳贊成客有謂余曰子之傳贊書則工矣何不併其像而梓之令見者聞者悉發歡喜學士得覩文思義庸夫亦見相發心顧不善與余應曰唯唯否否客第知繪像之善而不知繪像之難也夫諸佛菩薩之相形如滿月具無上莊嚴三十二玅百千種好故能令眾生見者無不歡喜而此諸老或清或奇或古或怪大率皆長眉粗髮道貌癯顏必藉丹青點染繪為碧眼方瞳紫襴紅衲然後見其眉目之軒昂衣褶之古拙若但澹澹白描粗粗筆仗惟有髮根面皺條條點點陡露印板痕即見者合掌恭敬倘有毫髮遺憾便增上慢何如獨梓其傳贊令讀之者知其為誰氏之子某之產何年付法何地傳衣痛棒熱喝笑罵一堂山空谷響諸老且揚眉吐氣如在如生威儀動靜亦可髣髴其萬一也即有以不見其像為恨者流連追慕亦謂一時缺典然暗中摸索默地思維輙作絲繡金鑄栴檀寶飾之想而此諸老不儼然具大人相從空現出丈六金身翻令人想見丰采而眷戀無窮也哉且此事亦大有因緣非一人一手之力余得藉孫䱷公高寓公諸子以克成此帙緬維歲月達師臨寫為三堂寔始甲申憨公傳贊于冊葉則以庚申今余手壽諸梨棗復遇壬申綿歷四紀宛轉多人終始于申若有神合豈偶然哉豈偶然哉雖然此亦一時權語也浸假而數年使余書稍進余力稍厚諸子或更有同心尚將倩名筆繪像復出敝帚勒之於璠璵之石客以為何如𭬥李錢應金仙上撰祖師道影傳贊記附國初大內有祖師畵像八十八尊供牛首山之祖堂達觀師屬新安名手丁南羽重摹分送五臺峨眉南嶽則萬曆甲申歲也曾儀部𢹂南嶽本歸湖東憨公轉示吳兵憲生白兵憲又屬史生臨一冊自隨則乙卯秋也其後吳公擢嶺南大方伯復遇憨公請補傳贊而手書之則泰昌庚申歲也吳公謂藏于家不若藏于山即授鷹窠頂寺僧心燈供養則天啟癸亥歲也心燈裝潢四冊貯之朱匣托錢而介為介走佘山索予為之記其始末予兒夢蓮八歲孫先覺皆得瞻禮則崇禎辛未九月也先覺問曰金剛經是相非相然乎予曰孺子何知張永嘉相公欲去宣尼塑像引程子云父母像倘有一毫不類與拜別人同吾鄉徐文貞爭曰倘有一毫似人子其忍委而棄之永嘉無以對此冊祖影之公據也堂堂龍象色正芒寒方冊之中如建塔廟如雨舍利但無千百億化身應現于天下名山耳孫雛乃稽首唯唯而退雲間陳繼儒眉公題重訂憨山禪師八十八祖道影傳贊目錄秀水高承埏寓公父編次男佑釲念祖佑鋅禦宼正字卷一西天二十七代祖師又旁出一人阿若憍陳如尊者旁出初祖摩訶迦葉尊者二祖阿難陀尊者三祖商那和尊者台宗尚有阿難旁出末田地尊者四祖優波毱多尊者五祖提多迦尊者六祖彌遮迦尊者七祖婆須蜜尊者台宗不承八祖佛陀難提尊者九祖伏䭾蜜多尊者十祖脇尊者十一祖富那夜奢尊者十二祖馬鳴大士十三祖迦毗摩羅尊者十四祖龍樹尊者台宗稱為高祖論主龍樹尊者一相大禪師十五祖迦那提婆尊者十六祖羅睺羅多尊者十七祖僧伽難提尊者十八祖伽耶舍多尊者十九祖鳩摩羅多尊者二十祖闍夜多尊者二十一祖婆修盤頭尊者二十二祖摩拏羅尊者二十三祖鶴勒那尊者二十四祖師子尊者已上即繫台宗所承西土二十四祖二十五祖婆舍斯多尊者已下三祖台宗不承二十六祖不如蜜多尊者二十七祖般若多羅尊者卷二漢季六朝神僧漢吳建業建初寺超化禪師康僧會晉後趙鄴都鄴宮寺大和尚西竺佛圖澄晉蓮宗初祖潯陽廬山東林寺正覺圓悟玅覺寂光宏辯大師慧遠是為淨土蓮宗十祖名號并贊附梁建康鍾山華林園道林真覺菩薩慧感慈應普濟聖師寶誌梁建康草堂寺菩薩戒國師智者婁惠約梁隋唐三朝東土六代祖師梁後魏禪宗初祖雒州嵩山少林寺圓覺禪師南天竺菩提達磨是為教外別傳隋禪宗二祖太湖司空山大祖禪師慧可隋禪宗三祖舒州皖公山鑑智禪師僧璨唐禪宗四祖蘄春破頭山大毉禪師道信唐禪宗五祖黃梅馮茂山大滿禪師弘忍唐禪宗六祖韶州南華山曹溪寶林寺大鑑真空普覺圓明禪師慧能唐朝教主性宗天台五祖天台國清寺結集宗教章安尊者總持大禪師灌頂是為四教法性觀行宗台宗十七祖名號附相宗慈恩二祖京兆大慈恩寺三藏法師玄奘是為三乘法相顯理宗慈恩三祖名號附律宗九祖京兆終南山紵麻蘭若澄照法慧律師道宣是為行事防非止惡宗律宗九祖名號附相宗慈恩三祖京兆大慈恩寺百部論師窺基性宗華嚴三祖京兆大薦福寺賢首菩薩戒師贈鴻臚卿康居法藏是為一念圓融具德宗華嚴五祖名號附蓮宗四祖長安五會國師法照密宗瑜珈二祖京兆大興善寺灌頂智藏國師特進鴻臚卿加開府儀同三司肅國公食邑三千戶贈司空大辯正廣智三藏不空金剛是為瑜珈秘密微玅宗密宗五祖名號附卷三唐朝禪師吉州青原山靜居寺弘濟禪師行思禪宗六祖下一世衡州南嶽般若寺大慧禪師懷讓禪宗六祖下一世性宗天台七祖弟子永嘉真覺無相大師明道玄覺禪宗六祖旁出密宗瑜珈五祖東都嵩山罔極寺大慧禪師一行禪宗五祖旁出玉泉神秀下嵩山普寂嗣江西洪州龍門山大寂禪師馬祖道一南嶽下一世衡州南嶽石頭庵無際禪師希遷青原下一世性宗華嚴四祖京兆大華嚴寺教授和尚大統清凉鎮國大師天下大僧錄大休禪師澄觀禪宗六祖旁出荷澤神會下五臺無名嗣荊州天皇寺禪師道悟景德傳燈錄列青原下二世越州大雲寺大珠禪師慧海南嶽下二世馬祖旁出宣州水西山斷際禪師黃蘗希運南嶽下三世後出臨濟宗潭州大溈山同慶寺大圓禪師靈祐南嶽下三世溈仰宗性宗華嚴五祖京兆終南山草堂寺圭峯蘭若大德定慧禪師宗密禪宗六祖旁出荷澤會下四世繫荊南道圓嗣鎮州臨濟院慧照禪師義玄南嶽下四世臨濟宗筠州洞山悟本禪師良价青原下四世曹洞宗撫州曹山元證禪師躭章本寂青原下五世曹洞宗杭州秦望山鳥窠圓修禪師道林禪宗四祖旁出牛頭法融下七世繫徑山道欽嗣後梁禪師福州雪峯山真覺禪師義存道悟下三世後出雲門法眼宗後漢韶州雲門山光奉院大慈雲匡真弘明禪師文偃贊附道悟下四世祖堂無像不立傳後周南唐江寧清涼院淨慧玄覺大法眼大智藏大導師文益贊附道悟下六世祖堂無像不立傳卷四宋朝禪師汝州首山禪師省念南嶽下八世臨濟宗派蓮宗六祖吳越杭州南山慧日永明寺智覺應真宗照禪師延壽禪宗道悟下八世繫法眼文益下天台德韶嗣潭州石霜山慈明禪師楚圓南岳下十世臨濟宗派後分出楊岐黃龍二支越州天衣寺振宗禪師義懷道悟下八世雲門宗雪竇重顯嗣南康匡廬山歸宗寺佛印禪師覺老了元道悟下八世雲門宗開先善暹嗣隆興黃龍寺普覺禪師慧南南岳下十一世臨濟宗黃龍支袁州楊岐山禪師方會南岳下十一世臨濟宗楊岐支舒州白雲山海會院禪師守端南岳下十二世臨濟宗楊岐嗣黃梅五祖山禪師法演南岳下十三世臨濟宗楊岐孫後出虎丘派杭州徑山佛鑑圓照禪師無準師範南岳下十九世臨濟宗虎丘派宋朝法師性宗天台十七祖慶元四明山延慶院法智大師約言知禮元朝禪師袁州仰山禪師雪巖祖欽南岳下二十世臨濟宗虎丘派安慶太湖山禪師無用寬南岳下二十世臨濟楊岐派金牛真嗣杭州西天目山師子巖佛日普明廣濟禪師高峯原妙南岳下二十一世臨濟宗虎丘派衡州南嶽禪師鐵山瓊南岳下二十一世臨濟虎丘派雪巖欽旁出蓮宗八祖杭州天目山師子正宗寺佛慈圓照廣慧智覺普應國師中峯明本禪宗南岳下二十二世臨濟宗虎丘派杭州天目山師子正宗寺佛慧圓明正覺普度大師斷崖了義南岳下二十二世臨濟宗虎丘派高峯妙旁出龍興般若寺禪師絕學世誠南岳下二十二世臨濟宗虎丘派雪巖祖欽旁出鐵牛持定嗣婺州伏龍山聖壽寺普應玅智弘辯佛慧圓明廣照無邊普利大禪師千巖元長南岳下二十三世臨濟宗虎丘派廣德石溪禪師無一全嗣法未詳再考廣德石溪禪師本空照嗣法未詳再考大滿大禪師嗣法未詳再考國初禪師僧錄司右善世掌天下僧教事南京大天界寺住持前徑山五十五代禪師季潭宗泐南岳下二十一世臨濟宗楊岐派笑隱大訢嗣南京大天界寺寂照圓明大禪師碧峯寶金南岳下二十二世臨濟宗楊岐派無用寬下如海真嗣杭州府西天目山師子正宗寺禪師前松隱庵主唯庵德然南岳下二十二世臨濟宗虎丘派千巖元長旁出卷附萬曆間賜紫衣三禪師蓮宗十祖杭州府重興雲棲寺蓮池禪師袾宏嘉興府重興楞嚴寺達觀禪師真可韶州府重興曹溪南華寺憨山禪師德清雪嶠信禪師傳附重訂憨山禪師八十八祖道影傳贊目錄終
