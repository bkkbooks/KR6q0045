body:
  text: 匡廬憨山釋德清述秀水寓公高承埏補嘉興上士錢應金較陳如尊者傳阿若憍陳如尊者阿若名也此云解陳那或云陳如此云火器姓也以先世從事遂以為氏佛之母族也以佛初出王宮入山時有五人隨侍陳那其一也後佛在山修行五人去佛各修異道及佛六年苦行初成道時詣鹿野苑五人聞之俱集佛最初說三轉四諦法輪問五人云汝等解否尊者先答云已解故佛印云阿若憍陳那故得此名佛度常隨弟子一千二百五十人以陳那先悟故居僧首率先得度蓋有夙因按因果經佛昔為忍辱仙人在山修道陳那為王名歌利王性最㬥惡一日將諸綵女入山遊獵王倦假𥧌綵女入林採花至仙人庵前仙人為說法良久王窹不見諸女𢹂劒尋之見在仙所王怒問曰汝何人耶答忍辱仙人也王問得上地定否答曰未王曰既未得定乃凡夫耳遂拔劒截下仙人手足仙人神色不動王曰汝恨我耶仙曰不恨願我成佛先度于王今先度陳那即歌利王也贊曰象王遊行象子隨至聲氣相求緣會而聚以冤最重為道至親如車合轍是必有因初祖迦葉尊者傳西天初祖摩訶迦葉尊者摩竭陀國人姓婆羅門摩訶梵語此云大迦葉波云飲光名也父飲澤母香志師生而金色因昔為鍛金師善明金性過去有佛名毗婆尸入滅起塔塔中像壞時有貧女將金珠往金師所換金飾像因捨之二人發願為夫婦由是因緣感九十一劫身皆金色久生天上後生摩竭陀國身色金明故稱為飲光見佛志求出家佛言善來比丘鬚髮自除袈裟著體常于衆中稱歎第一習頭陀行是稱金色頭陀佛將涅槃拈花示衆衆罔然惟尊者破顏微笑佛言吾有正法眼藏實相無相微妙法門涅槃妙心用付于汝善自護持乃說偈曰法本法無法無法法亦法今付無法時法法何曾法是為禪宗始祖贊曰金色之形金剛為心奉持慧命常轉法輪世尊拈花破顏一笑至今令人思議不到二祖阿難尊者傳二祖阿難尊者王舍城人姓剎利帝父斛飯王實佛之從弟也梵語阿難陀此云慶喜亦云歡喜如來成道夜生因為之名多聞博達智慧無礙世尊稱為總持第一夙生世世從事諸佛受持法藏故今從佛出家為侍者佛所說法一字不遺故佛滅後結集法藏皆從口宣迦葉問諸大衆阿難所言不錯謬乎皆曰不異世尊所說迦葉乃吾阿難我今年不久留今將正法眼藏付囑于汝汝善護持聽吾偈言法法本來法無法無非法何于一法中有法有不法說偈已迦葉乃持僧伽黎入雞足山入定候慈氏下生阿難是為二祖贊曰多聞如海飲縮法流諸佛出沒不離舌頭鼓簧法化節拍成令是故我師為偏中正三祖商那和修尊者傳三祖商那和修尊者摩突羅國人也姓毗舍多父林勝母憍奢耶在胎六年而生梵語商諾迦此云自然服即西域九節秀草名也若聖人降生則此草生于淨潔之地尊者生時瑞草斯應昔如來行化至摩突羅國見一青林枝葉茂盛語阿難曰吾滅後一百年有比丘商那和修于此林中轉妙法輪後果誕和修受慶喜尊者法眼止此林中降二火龍龍施其地以建梵宮尊者化緣既久思付正法適吒利國優波毱多來歸以為給侍問毱多曰汝年幾耶答言我年十七者曰汝身十七性十七耶答曰師髮已白為髮白耶心白耶者曰我髮白非心白也多曰我身十七非性十七也尊者知是法器後三年遂為落髮受具乃告曰昔如來以正法眼無上妙法付囑迦葉展轉至我我今付汝勿令斷絶聽吾偈言非法亦非心無心亦無法說是心法時是法非心法是為三祖贊曰般若靈根夙生已證故師將出瑞草先應以心印心如火投火狹路相逢定沒處躲四祖優波毱多尊者傳四祖優波毱多尊者吒利國人也姓首陀父善意十七出家二十證受三祖心印隨方行化得度甚衆由是魔宮震動波旬愁怖遂竭魔力以害尊者尊者入定魔持瓔珞縻之于頸及出定乃取人狗蛇三尸化為華鬘軟語酬之魔喜受而繫之即為臭尸蛆蟲壞爛厭惡不堪盡其魔力竟不能去乃哀求之尊者令魔歸三寶懺悔改過得脫尊者每度一人置一籌于石室室方丈充滿其間後有一長者子名曰香衆來乞出家尊者問曰汝身出家心出家耶答我來出家非為身心者曰不為身心誰復出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然者曰汝當大悟心自通達即為剃度授具足戒仍告曰汝父夢金日而生汝可名提多迦謂曰如來以大法眼藏次第至我我今付汝勿令斷絶善自護持聽吾偈言心自本來心本心非有法有法有本心非心非本法是為四祖贊曰一人心空魔宮震動握金剛鋒誰敢輕弄若肯回光狂心頓歇禮拜皈依諸罪消滅五祖提多迦尊者傳五祖提多迦尊者摩伽陀國人也梵語提多迦此云通真量初生時父夢金日自屋而出照耀天地前有大山諸寶嚴飾山頂泉涌滂沱四流後遇毱多尊者為解之曰寶山者吾身也泉涌者法無盡也日從屋出者汝今入道之象也照耀天地者汝智慧超越也尊者聞說歡喜而唱言巍巍七寶山常出智慧泉回為真法咏能度諸有緣毱多尊者亦說偈言我法傳與汝當現大智慧金日從屋出照耀于天地尊者聞偈設禮奉持後至中印度國有八千大仙彌遮迦為首聞尊者至率衆瞻禮曰昔與師同生梵天我遇仙人授我仙法師逢佛子修習禪那自此報分殊途已經六劫者曰支離纍劫誠哉不虗今可捨邪歸正以入佛乘彌遮迦曰今幸相遇非夙緣耶願師慈悲令我解脫尊者即度出家授具乃告曰昔如來以大法藏密付迦葉展轉至我我今付汝當護念之乃說偈曰通達本法心無法無非法悟了同未悟無心亦無法是為五祖贊曰已悟本心如日照夜示生死夢光明超越師法本無我法不有以空合空舌不出口六祖彌遮迦尊者傳六祖彌遮迦尊者中印度人也既傳法已遊至北天竺國見雉堞之上有金色祥雲歎曰此道人氣也必有吾嗣乃入城闤闠間有一人手持酒器逆而問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否祖曰此是觸器而負淨者曰師識我否祖曰我即不識識即非我乃謂之曰汝試自稱名氏吾當示汝本因彼人說偈曰我從無量劫至于生此國本姓頗羅墮名字婆須蜜祖曰我師提多迦說世尊昔遊北印度語阿難言此國中我滅度後三百年有一聖人出姓頗羅墮名婆須蜜而于禪祖當獲第七世尊記汝汝應出家彼乃置器禮師側立而言曰我思往劫嘗作檀那獻一如來寶座彼佛記我曰汝于賢劫釋迦法中宣傳至教今符師說願加度脫祖即為披剃受具乃告之曰世尊所傳正法眼藏吾今付汝無令斷絶乃說偈曰無心無可得說得不名法若了心非心始解心心法是為六祖贊曰都因此來不為別事鬧市相逢自示其器懸見未然蚤知今日當行買賣不論價值七祖婆須蜜尊者傳七祖婆須蜜尊者北天竺國人也姓頗羅墮此云捷疾利根常服淨衣執酒器遊行里閈或吟或嘯人謂之狂及遇彌遮迦尊者宣如來往志自省前緣投器出家受法行化至迦摩羅國廣興佛事于法座前忽有智者自稱我名佛陀難提今與師論義祖曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽服曰我願求道霑甘露味祖遂為剃度而受具戒告曰如來正法眼藏我今付汝汝當護持乃說偈曰心同虗空界示等虗空法證得虗空時無是無非法付法已即入慈心三昧時梵王帝釋諸天俱來作禮而說偈言賢劫衆聖祖而當第七位尊者愛念我請為宣佛地尊者從三昧起示衆曰我所得法而非有故若識佛地離有無故語訖還入三昧是為七祖贊曰從熟路來忽逢親友一言論義頓知本有乞甘露味示虗空法若謂有得落七落八八祖佛陀難提尊者傳八祖佛陀難提尊者迦摩羅國人也姓瞿曇氏頂有肉髻辨捷無礙初遇婆須蜜出家受教既而領徒至提伽國毗舍羅家見舍有白光上騰謂其徒曰此家有聖人口無言說真大乘根器不行四衢知觸穢耳言訖長者出致禮問何所須祖曰我求侍者長者曰我有一子名伏䭾蜜多年已五十口未曾言足未曾履祖曰如汝所說真吾弟子伏䭾聞之遽起禮拜而說偈言父母非我親誰是最親者諸佛非我道誰為最道者祖以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏䭾聞已便行七步祖曰此子昔曾值佛悲願廣大慮父母愛情難捨故不言履耳長者遂捨出家祖尋授具戒復告之曰我今以如來正法眼藏付囑于汝勿令斷絶乃說偈曰虗空無內外心法亦如此若了虗空故是達真如理是為八祖贊曰不是不言言之不及不是不行本無蹤跡今遇其人乃可開口從此便行不墮窠臼九祖伏䭾蜜多尊者傳九祖伏䭾蜜多尊者提伽國人也姓毗舍羅既受八祖付囑後至中印度行化時有長者香蓋𢹂一子而來瞻禮于祖曰此子處胎六十歲因號難生嘗會一仙謂此兒非凡當為法器今遇尊者可令出家祖即與落髮受具羯磨之際祥光燭座仍感舍利三七粒現前自此精進忘疲既而祖告之曰如來以大法眼藏展轉至我我今付汝汝護念之勿令斷絶乃說偈曰真理本無名因名顯真理受得真實法非真亦非僞是為九祖贊曰住母胎中經六十年只待師來方遂前緣頂上光明元是本有一刮便透如獅子吼十祖脅尊者傳十祖脅尊者中印度人也本名難生初將誕時父夢一白象背有寶座座上安一明珠從門而入光照四衆既覺遂生後值九祖執侍左右未嘗睡眠以脅不至席遂號脅尊者焉初至華氏國憩一樹下右手指地而告衆曰此地變金色當有聖人入會言訖即變金色時有長者子富那夜奢合掌前立祖問曰汝從何來答曰我心非往祖曰汝何處住答曰我心非止祖曰汝不定耶曰諸佛亦然祖曰汝非諸佛曰諸佛亦非祖因說偈曰此地變金色預知有聖至當坐菩提樹覺華而成已夜奢復說偈曰師坐金色地常說真實義回光而照我令入三摩地祖知其意即度出家為授具戒乃告之曰如來大法眼藏今付與汝汝護念之乃說偈曰真體自然真因真說有理領得真真法無行亦無止是為十祖贊曰指地變金隨手而現聖人即至何等快便似呼空谷應聲答響是知我心本無來往十一祖富那羅夜多尊者傳十一祖富那夜奢尊者華氏國人也姓瞿曇氏父寶身既得法于脅尊者尋訪波羅奈國有馬鳴大士迎而作禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是曰佛既不識焉知是乎祖曰既不識佛焉知不是曰此是鋸義祖曰彼是木義祖曰鋸義者何曰與師平出馬鳴却問木義者何祖曰汝被我解馬鳴豁然省悟稽首歸依遂求剃度祖謂衆曰此大士者昔為毗舍利國王其國有一類人如馬裸形王運神力分身為蠶彼乃得衣王後復生中印度馬人感戀悲鳴因號馬鳴焉如來記云吾滅度後六百年當有賢者馬鳴于波羅奈國摧伏異道度人無量繼吾傳化今正是時即告之曰如來大法眼藏今付與汝即說偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二是為十一祖贊曰佛不識佛眼不見眼更向他覓故遭簡點將謂渾全早被解破猛省將來方知話墮十二祖馬鳴尊者傳十二祖馬鳴大士者波羅奈國人也既受法于夜奢尊者後于華氏國轉妙法輪俄從地湧出金色人復化為女子右手指祖而說偈言稽首長老尊當受如來記今于此地上宣通第一義言訖瞥然不見祖曰將有魔來有頃風雨暴至天地晦冥祖曰魔來信矣吾當除之即指空中現一大金龍奮發威猛震動山嶽祖儼然于座魔不能動祖告之曰汝但歸依三寶即得神通遂復本形作禮懺悔祖問曰汝名誰耶眷屬多少曰我名迦毗摩羅有三千眷屬祖曰汝盡神力變化若何曰我化巨海極為小事祖曰汝化性海得否曰何謂性海我未嘗知祖即為說性海曰山河大地皆依建立三昧六通由茲變現迦毗摩羅聞言遂發信心與徒衆三千俱求剃度祖乃召五百羅漢與授具戒復告之曰如來大法眼藏今當付汝汝聽偈言隱顯即本法明暗元不二今付悟了法非取亦非離是為十二祖贊曰馬之悲鳴固自有因地湧女子元非其人魔本非魔佛亦非佛正眼看來竟是何物十三祖迦毗摩羅尊者傳十三祖迦毗摩羅尊者華氏國人也初為外道有徒三千通諸異論有大神力後于馬鳴尊者得法領徒至西印度彼有太子名雲自在仰尊者名請于宮中供養祖曰如來有教沙門不得親近國王王子太子曰國城之北有山山有石窟可禪寂不祖曰諾祖入山數里逢一大蟒祖因與授三歸五戒蟒聽訖而去祖至石窟時一老人素服作禮祖曰汝何所止答曰我昔為比丘習靜于此時有初學比丘數來請益而我煩于應答起嗔恨想命終遂墮蟒身住此窟中今已千載幸遇尊者獲聞戒法已得脫苦故來謝耳祖問此山更有何人居止曰此去十里有大樹蔭覆五百大龍其樹王名龍樹常為龍衆說法祖遂與徒衆詣彼龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念此師得決定性明道眼否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹悔謝祖即與度脫及五百龍衆俱授具戒告曰如來大法眼藏付囑于汝聽吾偈言非隱非顯法說是真實際悟此隱顯法非愚亦非智是為十三祖贊曰從異中來得正知見路逢毒蛇慈悲心現更問毒龍都要調伏眼見心知如響出谷十四祖龍樹尊者傳十四祖龍樹尊者西天竺國人也始于摩羅尊者得法後至南印度彼國之人多信福業祖為說法開示佛性聞者悉回初心祖復座上現自在身如滿月輪大衆唯聞法音不見身相衆中有長者子名迦那提婆謂衆曰識此相否衆曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之蓋無相三昧形如滿月佛性之義廓然虗明言訖輪相即隱復居本座而說偈言身現圓月相以表諸佛體說法無其形用辨非聲色彼衆聞偈頓悟無生咸願出家以求解脫祖即為剃髮受具其國先有外道五千餘人作大幻術祖悉化之令歸三寶乃造大智度論中論十二門論垂之後世後告上首弟子迦那提婆曰如來正法眼藏今當付汝聽吾偈言為明隱顯法方說解脫理于法心不證無嗔亦無喜是為十四祖贊曰龍中化龍以毒攻毒尊者妙手一言調伏佛性三昧體若虗空百千法門盡入其中十五祖迦那提婆尊者傳十五祖迦那提婆尊者南天竺國人也姓毗舍羅初求福業兼樂辨論後謁龍樹大士將及門龍樹知是智人先遣侍者以滿鉢水置于座前尊者覩之即以一針投之而進欣然契會龍樹即為說法不起于座現月輪相唯聞其聲不見其形祖語衆曰今此瑞者師現佛性表說法非聲色也祖既得法至迦毗羅國彼有長者曰梵摩淨德一日園樹生耳如菌味甚甘美唯長者與第二子羅睺羅多取而食之取已遂長盡而復生餘皆不知祖知宿因遂至其家長者乃問其故祖曰汝家昔曾供一比丘道眼未明以虗霑信施故報以木菌唯汝與子精誠故得以享之餘則否矣又問長者年多少答曰七十有九祖乃說偈曰入道不通理復身還信施長者八十一其樹不生耳長者聞已彌加歎服即捨次子隨師出家尊者即為剃度授具乃付法眼偈曰本對傳法人為說解脫理于法實無證無終亦無始是為十五祖贊曰以針投鉢妙契忘言示佛性義滿月現前至長者家將針引線假他因緣為己方便十六祖羅睺羅多尊者傳十六祖羅睺羅多尊者迦毗羅國人也得法已行化至室羅筏城有河名金水其味殊美中流復現五佛影祖告衆曰此河之源凡五百里有聖者僧伽難提居于彼處佛志一千年後當紹聖位語已領諸徒衆泝流而上至彼見僧伽難提安坐入定祖與衆伺之經三七日方從定起祖問曰汝身定耶心定耶提曰身心俱定祖曰身心俱定何有出入提曰雖有出入不失定相如是問答詰難六七轉語祖為說無我義提曰仁者師誰得是無我祖曰我師迦那提婆證是無我難提以偈讚曰稽首提婆師而出于仁者仁者無我故我欲師仁者祖以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然即求度脫祖曰汝心自在非我所繫祖以右手擎鉢至梵宮取香飯與難提分坐食之乃告衆曰吾分坐者即過去娑羅樹王如來也愍物降跡于此提以神力展右手至地金剛際取甘露水以琉璃器持飲大衆無不欽仰祖付法眼偈曰于法實無證不取亦不離法非有無相內外云何起是為十六祖贊曰尋流得源水窮山盡忽見其人知其為聖香飯擎來分座共食大衆同飲甘露如蜜十七祖僧伽難提尊者傳十七祖僧伽難提尊者室羅筏城寶莊嚴王子也生而能言常讚佛事七歲即厭世樂以告父母願請出家父母固止之遂終日不食乃許其在家出家號僧伽難提積十九年每自念言身居王宮胡為出家一夕天光下矚見一路平坦不覺徐行約十里許至大巖前有石窟焉乃晏寂于中父母訪尋不得經十年遇羅睺羅多尊者開示得法已行化至摩提國忽有凉風襲衆身心悅適非常祖曰此道德之風也當有聖者出世嗣祖燈乎與衆遊歷山谷至一峰下謂衆曰此峰有紫雲如蓋聖人居之矣徘徊久之見山舍一童子持圓鑑直造祖前祖問汝幾歲耶曰百歲祖曰汝年尚幼何言百歲童曰我不會理正百歲耳祖曰汝善機耶童曰佛言若人生百歲不會諸佛機未若生一日而得決了之父母聞子語即捨出家祖與授具名伽耶舍多他時聞風吹殿鈴鳴祖問曰鈴鳴耶風鳴耶多曰非風非鈴我心鳴耳祖曰善哉即付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾是為十七祖贊曰不樂王宮天開一路直抵窮源不知其故紫雲之下聖者所依果得童子會諸佛機十八祖伽耶舍多尊者傳十八祖伽耶舍多尊者摩提國人也姓鬱頭藍父天蓋母方聖嘗夢大神持鑑因而有娠凡七日而誕肌體瑩如琉璃未嘗洗沐自然香潔幼好間靜語非常童持鑑出遊遇難提尊者得度後領徒至大月氏國見一婆羅門舍有異氣祖將入彼舍舍主鳩摩羅多問曰是何徒衆祖曰是佛弟子彼聞佛號心神悚然即時閉戶祖良久扣其門多羅曰此舍無人祖曰答無者誰多羅聞語知是異人遽開關延接祖曰昔世尊記曰吾滅後一千年有大士出現于月氏國紹隆玄化今汝值吾應斯嘉運于是鳩摩羅多發宿命智投誠出家祖為剃度授具付法偈曰有種有心地因緣能發萌于緣不相礙當生生不生是為十八祖贊曰七日而生不墮諸陰其體香潔本來清淨扣門一語答無者誰猛然喚醒當下知歸十九祖鳩摩羅多尊者傳十九祖鳩摩羅多尊者大月氏國婆羅門之子也昔為自在天人見菩薩瓔珞忽起愛心墮生忉利聞帝釋說般若故升于梵天以利根故善說法要諸天尊為導師以繼祖時至遂降生月氏得舍多心印後至中天竺國有大士名奢夜多問曰我家父母素信三寶而常縈疾瘵營事多不如意鄰人為旃陀羅以殺為業身常勇健作事和合彼何幸而我何辜祖曰何足疑乎且善惡報應有三時焉凡夫但見仁夭暴壽逆吉義凶便謂亡因果虗罪福殊不知影響相隨毫𨤲靡忒縱經百千萬劫亦不磨滅奢夜多聞是語已頓失所疑祖曰汝雖已信三業未明業從惑生惑依識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻奢夜多承言領旨即發宿慧懇求出家祖為剃度授具乃付法眼偈曰性上本無生為對求人說于法既無得何懷決不決是為十九祖贊曰既生天上不應起愛一念未忘便不自在以般若力得升梵世故來傳燈是其家事二十祖奢夜多尊者傳二十祖奢夜多尊者北天竺國人也智慧淵沖化導無量後至羅閲城敷揚頓教彼有學衆唯尚辨論為之首者名婆修盤頭此云遍行常一食不臥六時禮佛清淨無欲為衆所歸祖將度之先問彼衆曰此遍行頭陀能修梵行可得佛道乎衆曰我師精進何故不可祖曰汝師與道遠矣設苦行塵劫皆虗妄之本衆曰尊者蘊何德行而譏我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道遍行聞已發無漏智歡喜讚歎祖曰吾適對衆抑挫仁者得無惱乎遍行曰我憶七劫生安樂國師與智者月淨記我非久當證斯陀含果自是以來聞諸惡言如風如響況今獲飲無上甘露而返生熱惱耶惟願大慈以妙道垂誨祖曰汝久植衆德當繼吾宗乃付大法眼偈曰言下合無生同于法界性若能如是解通達事理竟是為二十祖贊曰無生本具不用求真遇緣而發如華逢春求之太急去道轉遠當下知歸就路而返二十一祖婆修盤頭尊者傳二十一祖婆修盤頭尊者羅閲城人也姓毗舍佉父光蓋母嚴一家富無子父母禱于佛塔而求嗣焉一夕母夢吞明暗二珠覺而有孕經七日有一羅漢名賢仲至其家光蓋獻珠設禮賢仲端坐受之嚴一出拜賢仲避席光蓋罔測其由不能忍問曰我是丈夫致禮不顧我妻何德尊者避之賢仲曰我受禮納珠貴福汝耳汝婦懷聖子生當為世燈慧日故吾避之非重女人也乃曰汝婦當生二子一名婆修盤頭則吾所尊者二名芻尼昔如來雪山修道芻尼巢于頂上佛成道乃記曰汝至第二五百年生羅閲城毗舍佉家與聖同胞今無爽矣後果産二子婆修盤頭生年十五禮光度羅漢出家修頭陀行後受奢夜多法眼行化至那提國彼國王名常自在尊者見曰佛記第二五百年有二大神力大士出家繼聖即王之次子摩拏羅是其一也吾雖德薄敢當其一王曰誠如尊者所言當捨此子作沙門王即以次子摩拏羅捨之尊者即與披剃授具付大法眼偈曰泡影同無礙如何不了悟達法在其中非今亦非古是為二十一祖贊曰明暗同體聖凡一路來處幽微莫知其故熟處難忘更求伴侶忽爾相逢肯心自許芻尼此名野鵲子賢仲南藏中作衆二十二祖摩拏羅尊者傳二十二祖摩拏羅尊者那提國常自在王之次子也年三十遇婆修尊者出家傳法至西印度彼國王名得度見禮尊者聞法感悟即傳位太子投祖出家七日而證四果祖慰之曰汝居此國善自度人今異域有大法器吾當往化于是祖焚香遙語月氏國鶴勒那比丘曰汝在彼國教導鶴衆道果將證宜自知之時鶴勒那為彼國王說修多羅忽覩異香成穗王曰是何祥也曰此是西印度傳佛心印祖師摩拏羅將至先降信香耳曰此師神力何如曰此師遠承佛記當于此土廣宣玄化時王與勒那俱遙作禮祖知已即往月氏國王與鶴勒那迎請供養勒那問曰我止林間已經九白不知何緣而感鶴衆祖曰汝前劫中嘗為比丘當赴龍宮齊汝諸弟子咸欲隨往汝觀五百衆中無有一人堪任供者汝權聽往自是以來汝捨生趣生常轉化諸國彼諸弟子以薄福德故生于羽族今感惠故為鶴衆相隨勒那曰以何方便令彼解脫祖曰我有無上法寶付汝當聽受化未來際而說偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂鶴衆聞偈飛鳴而去是為二十二祖贊曰從受記來不為別事同類相從緣合必遇嗟彼衆鶴飛鳴既久一言之下頓知本有印度一年為一白二十三祖鶴勒那尊者傳勒那梵語華言鶴也二十三祖鶴勒那尊者月氏國人也姓婆羅門父千聖母金光以無嗣禱于七佛金幢乃夢須彌山頂一神童持金環云我來也覺而有孕生年七歲遊行聚落覩民間淫祠乃入廟叱之曰汝妄興禍福幻惑于人歲費牲牢傷害斯甚言訖廟貌忽然隳壞由是鄉黨謂之聖子年二十二出家三十遇摩拏羅尊者付法眼藏行化至中印度演無上道度有緣衆以上足龍子早夭有兄獅子博通強記事婆羅門厥師既逝弟復云亡乃歸依尊者問曰我欲求道當何用心祖曰汝欲求道無所用心曰既無用心誰作佛事祖曰汝若有用即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞是語已即入佛慧時祖即指東北問曰是何氣象師子曰我見氣如白虹貫于天地復有黑氣五道橫亘其中祖曰其兆云何曰莫可知也祖曰吾滅後五十年北天竺國當有難起嬰在汝身吾將滅矣今以法眼付囑于汝善自護持聽吾偈言認得心性時可說不思議了了不可得得時不說知是為二十三祖贊曰從須彌頂持金環來嗟彼鶴衆其情可哀得獅子兒作大號吼有氣貫天試驗其後二十四祖師子尊者傳二十四祖師子比丘者中印度人也姓婆羅門得法遊方至罽賓國方求法嗣遇一長者引其子問祖曰此子名斯多當生便拳左手今既長矣終未能舒願尊者示其宿因祖覩之即以手接曰可還我珠童子遽開手奉珠衆皆驚異祖曰我前報為僧有童子名婆舍吾嘗赴西海齊受䞋珠付之今還吾珠理固然矣長者遂捨其子祖即與授具以前緣故名婆舍斯多祖即謂之曰吾師密有懸記罹難非久如來正法眼藏今轉付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即于今祖說偈已以僧伽黎密付斯多俾之他國隨機演化斯多受教直抵南天祖謂難不可苟免遂留罽賓本國有外道二人以幻術謀亂詐為僧形潛入王宮將移禍焉亂作王果怒曰吾素歸心三寶何為搆害即命毀僧伽藍祛除釋衆王自仗劒至尊者所問曰師得蘊空否祖曰已得王曰可施我頭祖曰身非我有何吝于頭王即斬之白乳涌高數尺王臂亦墮七日而終贊曰相見索珠開手便有以先所付別來不久知有夙缺特來奉酬將頭臨刃白乳橫流二十五祖婆舍斯多尊者傳二十五祖婆舍斯多尊者罽賓國人也姓婆羅門父寂行母常安樂初母夢得神劒因有孕既誕拳左手遇師子尊者顯發宿因密授心印即適南天時彼國王名天德迎請供養王有二子一名德勝凶暴而色力充盛一名不如密多柔和而長嬰疾苦祖乃為陳因果王頓釋所疑後德勝即位復信外道致難于祖不如密多以進諫被囚王遽問祖曰豫國素絶妖訛師所傳者當是何宗祖曰王國昔來實無邪法我所得者即是佛宗王曰佛滅已千二百年師從誰得耶祖曰飲光大士親受佛印展轉至二十四世師子尊者我從彼得王曰豫聞師子比丘不能免于刑戮何能傳法後人祖曰我師難起時密授我信衣法偈以顯師承王曰其衣何在祖即于囊中出衣示王王命焚之五色相鮮薪盡如故王即追悔致禮師子真嗣既明乃赦密多密多遂求出家祖為剃度授具羯磨之際大地震動祖曰吾已衰朽今以大法眼藏付汝當護念之聽吾偈曰聖人說知見當境無是非我今悟真性無道亦無理是為二十五祖贊曰秉般若劒握如意珠雖云暫到此行不虗偶遇惡人恰得好伴因邪打正兩得其便二十六祖不如密多尊者傳二十六祖不如密多尊者南印度天德王之次子也既受婆舍尊者法印至東印度彼王名堅固奉外道師長爪梵志及尊者將至梵志預知祖入恐王易志即鳩諸弟子欲以呪術挫之尊者至直詣王所王曰師來何為祖曰將度衆生王曰以何法度祖曰隨類度之梵志聞言不勝其怒即以幻法化大山于祖頂上祖指之忽壓彼衆梵志等怖懼投祖祖愍其愚惑再指之化山隨滅乃為王演說法要俾趣真乘因謂王曰此國當有聖人而繼于我是時有婆羅門子年二十許幼失父母不知名氏或自言瓔珞故人謂之瓔珞童子遊行閭里丐求度日後王與尊者同輦而出見瓔珞童子稽首于前祖曰汝憶往事否童曰我念遠劫中與師同居師演摩訶般若我轉甚深修多羅今日之事蓋契夙因祖謂王曰此童非他即大勢至菩薩是也此童之後出二人一化南印度一人緣在震旦遂以昔因故名般若多羅乃付大法眼藏偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智是為二十六祖贊曰從剎利種續傳燈𦦨真嗣不明幾乎失陷從鬧市中忽聞故人函蓋相合乃得其真二十七祖般若多羅尊者傳二十七祖般若多羅尊者東印度人也既得法已行化至南印度彼王名香至崇奉佛乘尊重供養度越倫等又施無價寶珠時王有三子曰月淨多羅曰功德多羅曰達磨多羅其季開士也祖欲試其所得乃以所施珠問三王子曰此珠圓明有能及否孟仲二子皆曰此珠七寶中尊固無踰也非尊者道力孰能受之季子曰此是世寶未足為上于諸寶中法寶為上此是世光未足為上于諸光中智光為上此是世明未足為上于諸明中心明為上此珠光明不能自照要假智光乃能辨此祖歎其辨慧知是法嗣以時未至且默而溷之及香至王厭世衆皆號絶唯達磨多羅于柩前入定七日而出乃求出家祖方與剃度授具戒告曰昔如來以正法眼藏付大迦葉如是展轉乃至于我我今囑汝聽吾偈言心地生諸種因事復生理果滿菩提圓華開世界起是為二十七祖贊曰莫謂無因相逢便見來處自然不假方便今因其珠乃得其人開池得月買石饒雲
