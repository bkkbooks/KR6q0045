body:
  text: 匡廬憨山釋德清述秀水寓公高承埏補嘉興上士錢應金較康居尊者傳康僧會者康居國大丞相之子也彼國出家有神異因望震旦國有光燭天曰此佛舍利光也遂尋光而來于吳赤烏四年至金陵止長于里營立茅茨設像行道國人初見沙門以為異有司以聞吳主孫權曰是漢明帝所夢佛道之遺風耶詔至問狀會曰如來大師入滅已千年矣然靈骨舍利神應無方昔阿育王奉之為八萬四千塔此其遺化也權以為誇已曰舍利可得當為塔之若其不國有常刑會請立壇求之期七日無又展二七無權曰趣烹之會默念佛名真慈豈違吾願哉更請展期又七日五鼓矣聞鏗然有聲起視瓶中光明錯發黎明進之權與公卿聚觀歎曰希世之瑞也會又言舍利威神一切世間無能壞者權使力士錐之砧碎而光明自若乃為建塔于建業之佛陀里又為寺奉會居之曰建初寺即今之大報恩寺乃江南塔寺之始也贊曰法身舍利普徧大地光明照耀無處不是爰有至人尋光而來懇求出現梵剎初開佛圖澄禪師傳天竺佛圖澄和尚至洛自言百餘歲常積日不食善誦呪役使鬼神腹傍有孔以綿塞之夜則拔綿光出照室每臨溪出腸胃洗濯還納腹中能聽鈴音言吉凶莫不奇會洛陽宼亂潛伏草萊以觀時變時石勒屯葛陂多殘殺澄杖錫謁勒勒試以道術澄取滿鉢水呪之俄青蓮華生鉢中光色耀日勒由是神敬延之軍中及勒稱趙王行皇帝事敬澄彌篤勒殂弟季龍襲其位徙都鄴城尤傾心事澄令乘雕輦朝會引見常侍御史悉助舉轝升殿太子諸公扶翼而前坐者皆起勅司空李農朝夕問候時支道林聞之曰澄公其以季龍為鷗鳥耶季龍因問曰佛法不殺朕為天下掌生殺恐違佛戒澄曰帝王事佛在恭儉慈忍顯讚佛道不為暴虐不害無辜民有為惡化之不悛者其可不罰乎但殺不可濫刑不可不恤耳將去世詣辭季龍驚曰大和尚遽棄我乎澄曰出生入死道之常也脩短分定無由增損但道貴行全德貴不怠苟德無玷雖死如生咸無焉千歲何益哉言訖安坐而逝後有僧自雍州來見澄入關以聞季龍發塚視之惟塊石存焉贊曰至人隱顯其行莫測透體光明其用自別出入帝庭如狎鷗鳥脫然歸去由來時道東林遠禪師傳東林遠禪師諱惠遠雁門樓煩人姓賈氏少為儒博極羣書尤𨗉周易老莊甞與其弟惠持造道安法師聞講般若經遂開悟歎曰九流異議特粃糠耳遂與其弟惠持投簪授業安師門徒數千師居第一座安師甞臨眾歎曰使道流東國其在遠乎師後隨安師遊襄陽值時亂安師徒屬分散臨岐皆蒙誨益惟師不聞一言即跪請曰獨無訓勅懼非人類安師曰如汝者復何所慮師東遊于晉抵潯陽見廬山愛之乃止龍泉精舍惠永先居西林師乃建寺于東號稱東林經營之際山神降靈其夕大雨雷震詰旦良木奇材羅列其處乃建其殿名曰神運時晉天下奇才多隱居不仕聞廬山遠公之道皆來從之師謂劉程之等曰諸君倘有淨土之遊當加勉勵遂同發志于無量壽佛立誓期生淨土由是集十八高賢結社念佛率眾至一百二十三人同盟棲心淨業獨陶淵明嗜酒聞山中無酒乃攢眉而去謝靈運鑿二池以栽蓮僧惠要刻十二葉芙蕖浮水以定時稱為蓮漏至今淨土一宗有七祖東林遠公是為初祖云贊曰曠志高懷游心淨土剏開東土以為初步蓮漏清聲流韵至今凡有聞者靡不歸心附錄錢塘虞淳熈蓮宗十祖贊昔止七祖至是升祔三祖稱為十祖初祖廬山辯覺正覺圓悟法師慧遠師道安遠公開宗首明心要像浮神運集賢契玅夢分法海十支澄照蓮社之名千秋永劭二祖長安光明法師善導云是彌陀化身導師化身而示厭身力竭汗流廢𥨊離裀口吐億光隨聲接人燈續無量帶累行因三祖南嶽般舟法師承遠般舟僕隷帝王遙禮糲食草土委擲錢米勤誘專念教魁普濟惡衣侍佛宏域先啟四祖長安五會法師法照善導後身師承遠傳見後法照教主依七佛師分燈華嚴傳聲宸居內外五會願力難思證無上覺俄返西池五祖新定臺巖法師少康臺巖康公來自安養錢誘千兒口吐萬象放光西逝一光無兩生已久生往實不往六祖永明智覺禪師延壽傳見後永明神棲珍域無邊萬善同歸七度順緣宗鏡攝色巢裓安禪定光口證即佛入廛七祖昭慶圓淨法師省常錢塘造微西湖佛日淨行淨侶公卿牧伯遠擬匡山近誰入室迴耀交光非二非一八祖天目中峰禪師明本傳見後中峰立地成無量光本性彌陀而自贊揚既參半偈更吐百章騰輝南詔歸主樂九祖天寧楚石禪師𣑽琦楚石文雄名聞禁闥三觀百吟一齊四達目覩勝蓮青光寥濶東西有無臨行一喝十祖雲棲蓮池禪師袾宏傳見後蓮池稱理早護牟尼秘大現凡行若嬰兒返念自性爰答予詞疏鈔重輪日耀西垂寶誌公禪師傳寶誌公大士初金陵東陽民朱氏之婦上巳日聞兒啼鷹窠中梯樹得之舉以為子七歲依鍾山大沙門僧儉出家至後顯跡以剪尺拂子挂杖頭負之而行於是往來皖山劒水之下髮而徒跣著錦袍俗呼為誌公面方而瑩徹如鏡手足皆鳥爪經行聚落兒童譁逐之或微索酒或累日不食甞遇食鱠者從求之食者分㗖之而有輕薄心誌即吐水中皆成活魚時時題詩初不可解後皆有齊武帝怒大士惑眾收逮獄是日國人咸見大士遊行市井既而簡較仍在獄中是後亦多異跡梁武帝初年詔大士寶誌跡拘塵垢神遊冥寂水火不能焦濡蛇虎不能侵懼語其佛理則聲聞已上談其隱淪則遁仙高者豈可以俗法常情空相疑忌自今中外任便宣化帝令張僧繇畵大士像下筆輙不自定誌自以指𠢐面門分披出十二面觀音玅相殊麗竟不能畵一日與帝臨江縱望有物泝流而上公以杖引之而至乃紫栴檀也即以屬供奉雕誌像頃刻而成神彩如生帝每以事問無不預言莫能悟及帝問國祚有留難否公指其頸意在侯景也先自卜塟地于鍾山贊曰至人潛行跡不可知從何處來為鷹之兒遊行世間人莫能測擘破面皮又何必說慧約國師傳補智者慧約國師字德素姓婁東陽烏傷人母留氏夢長人擎金像令吞之又見紫花繞身因而有孕便覺精神爽發思理明悟及誕之日光香充滿童時即以佛事為戲見鄉俗養蠶遂不服縑纊季父喜獵屢勸不改遂絕腥羶季父夜夢赤衣使者手持矛戟謂之曰汝終日殺生菩薩教化不從捉來就死驚覺汗流因改業師心欲出俗莫知所適忽見一僧問之僧東指曰剡中佛法甚盛遂不見方悟為神年十七始落髮于上虞東山寺事南林沙門慧靜及靜遷化巖棲却粒餌唯松术齊中書郎周顒創草堂寺以居之太宰淵太尉王儉交請開法淵甞𥨊疾見梵僧曰菩薩當至俄而師至病遂豁然即請受五戒師所居甞異香滿室猛獸馴階靈異不可殫述梁武帝大興戒法請師為闍黎尊之曰智者太子諸王公卿道俗從師受戒者四萬八千人說戒時甞有一乾鵲二孔來集聽之帝躬稟菩薩大戒自是入見別設漆榻帝先作禮後乃就坐及將入滅香滿法界師勉眾畢合掌而化帝親臨訣哭之慟勅葬寶誌公塔左所乘青牛吼淚不息建塔之始白鶴一雙繞塔悲鳴至葬後始去贊曰此大菩薩現比丘身戒從性發通豈修成作帝王師為教化主誌公是隣白鶴翔舞二十八祖菩提達磨尊者傳二十八祖菩提達磨大師者南天竺國香至國王第三子般若多羅既付法已謂曰待吾滅後六十七載當往震旦設大法藥直接上根慎勿速行衰于日下師演化國中久之思震旦緣熟即至海濵寄載商舶以梁大通元年達南海刺史蕭昂表聞詔入見帝問曰朕造寺寫經度僧有何功德師曰竝無功德帝曰何以無功德師曰此但人天小果有漏之因耳帝曰如何是真實功德師曰淨智玅圓體自空寂如是功德不以世求帝曰如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識帝不悟師知機不契遂渡江入魏止嵩山少林寺終日壁觀時有僧神光聞師乃往晨夕參承值天大雪光堅立不動遲明積雪過膝師愍而問曰汝當何求光悲泣哀請師責其慢心光潛取利刀自斷左臂置于師前師知是法器乃曰今汝斷臂求法此亦可在易名慧可可曰諸佛法印可得聞乎師曰諸佛法印匪從人得可曰我心未安師曰將心來與汝安可曰覓心了不可得師曰與汝安心竟光大悟告曰昔如來以正法眼藏付迦葉展轉至我今付與汝汝當護持并袈裟以為法信又楞伽四卷可為心印偈曰吾本來茲土傳法救迷情一花開五葉結果自然成是為此土初祖贊曰師心甚急其來太早一語不投此心不了冷坐少林幸得神光一臂墮落其道大昌二十九祖慧可大祖禪師傳二祖慧可大師者武牢人也姓姬氏父寂初無子禱之既久一夕感異光照室母因有娠生以照室之瑞遂名神光幼志不羣先依香山寶律禪師出家授具遊歷講肆三十年却返終日宴坐靜中見一神人告以授道之緣為換頭骨聞達磨大師默坐少林徑造竟得其心印自達磨西歸大師繼闡玄風博求法嗣後見一居士年踰四十不言名氏聿來設禮問曰弟子身纏風恙請師懺罪師曰將罪來與汝懺士良久曰覓罪了不可得師曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法師曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也師深器之即為剃髮云是吾寶也宜名僧璨其年三月十八日于光福寺授具自茲疾漸愈執侍二載師乃告曰菩提達磨遠自西竺來以正法眼藏并信衣密付與吾吾今授汝汝當守護勿令斷絕聽吾偈曰本來緣有地因地種花生本來無有種華亦不曾生是為此土二祖贊曰航海特來多少苦心震旦國裡祇得一人覓不可得如水任器以此傳家是為第二三十祖僧璨鑑智禪師傳三祖僧璨大師者不知何許人以白衣謁二祖受度傳法隱于舒州之皖公山屬後周武帝破滅佛法師往來太湖司空山居無常處積十餘年時人無能知者至隋開皇十二年有沙彌道信年始十四來禮祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信于言下大悟服勞九載後于吉州受戒侍奉尤謹祖屢試以玄微知其緣熟乃付衣法偈曰華種雖因地從地種華生若無人下種華地盡無生是為此土三祖贊曰通身是病不知來處忽逢醫王猛省其故心空骨剛且便行脚遇有力者一擔付託三十一祖道信大毉禪師傳四祖道信大師者姓司馬氏世居河內後徙于蘄州廣濟縣生而超異幼慕空宗諸解脫門宛如宿習既見三祖嗣法攝心無𥧌脇不至席者葢六十年隋大業十三載領徒眾抵吉州值羣盜圍城七旬不解萬眾惶怖祖愍之教念摩訶般若時賊眾望雉堞間若有神兵乃相謂曰城中必有異人不可攻矣稍稍引退唐武德甲申歲師却返蘄春住破頭山學侶雲臻一日往黃梅縣路逢女子𢹂一小兒骨相奇秀異乎常童祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛性祖曰汝無姓耶答曰性空故無祖默識其法器即俾侍者至其母所乞令出家母以夙緣故殊無難色遂捨為弟子以至傳法付衣偈曰華種有生性因地華生生大緣與性合當生生不生遂以學徒委之是為此土四祖贊曰少年出家利根捷疾六十餘年脇不至席學侶雲臻何待小兒以有夙約觀者不知三十二祖弘忍大滿禪師傳五祖弘忍大師者蘄州黃梅人先為破頭山栽松道者甞請于四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶儻若再來尚可遲汝乃去行水邊見一女子浣衣揖曰寄宿女曰我有父母可往求之曰諾我即敢行女首肯之遂回䇿而去女周氏季子也歸輙孕父母大惡逐之女無所歸日傭紡里中夕止于眾館之下已而生一子以為不祥因拋濁港中明日見之泝流而上氣體鮮明大驚遂舉之成童隨母乞食里人呼為無姓兒逢一智者歎曰此子缺七種相不逮如來後遇信大師得法嗣化于破頭山咸亨中有一居士姓盧名慧能自新州來參祖問曰汝自何來曰嶺南來祖曰欲須何事曰惟求作佛祖曰嶺南人無佛性曰人有南北佛性豈有南北乎祖知是異人乃曰著槽廠去盧入碓房腰石舂米八閱月一日祖求法嗣令眾各書偈呈解上座神秀書偈于壁曰身是菩提樹心如明鏡臺時時勤拂拭勿使惹塵埃祖知未悟盧書偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖見知之自入碓房令三更入室遂付衣鉢偈曰有情來下種因地果還生無情既無種無性亦無生是為此土五祖贊曰來歷不明出身恰好一件未完兩家都了破頭山中黃梅路上往來自由具大人相三十三祖慧能大鑒禪師傳六祖慧能大師者俗姓盧氏其先范陽人父行瑫武德中左官于新州遂籍焉師生三歲喪父其母守志鞠育及長家貧採樵以給一日負薪入市聞客讀金剛經至應無所住而生其心遂悟問客曰此何法也得于何人客曰此名金剛經得于黃梅忍大師祖遂告母以為法尋師之意先至韶州遇無盡尼說涅槃義遂修曹溪寶林寺以居之頃即之黃梅謁大師一見默識之遂傳衣法令隱于懷集四會之間獵人隊中十有六年至儀鳳元年正月屆南海法性寺時印宗法師講涅槃經座下有二僧見風吹旛動論動義未決祖曰非風非旛仁者心動印宗聞之知是異人問之祖以實告遂出示衣鉢一眾驚歎乃集眾剃髮于菩提樹下智光律師授具足戒印宗集緇白千人送歸寶林開法于曹溪座下開悟者三十餘人獨青原思南嶽讓二大師為上首自此道分兩派祖一日告眾曰吾忝受忍大師衣法今為汝等說法不付其衣葢為汝等信根淳熟決定不疑堪任大事聽吾偈曰心地含諸種普雨悉皆生頓悟華情已菩提果自成是為此土六祖贊曰樵斧纔拋以石墜腰靈根久植從此抽條源出曹溪橫流大地直至于今無處不是章安結集灌頂法師傳章安法師諱灌頂臨海章安人姓吳氏始生三月能隨母稱三寶名有僧過門謂其母曰此子非凡因以為名七歲依攝靜寺慧極出家日記萬言年二十受具戒天縱慧解一聞不忘陳至德初謁天台智者于修禪寺稟受觀法研繹既久頓蒙印可因為侍者隨所住處所說法門悉能領解隨智者大師聽講法華于金陵光澤受法華玄義及圓頓止觀于江陵玉泉至于餘處講說聽受之次悉與結集大小部袠百有餘部傳諸未聞天台一家教觀師大有功焉智者亡後師應皇太子令入京講法華玄義復送還山著涅槃玄義二卷疏二十卷時隋末兵興宼盜羣起師自序曰推度聖文凡歷五載何年不見兵火何月不見干戈菜食水齋氷床雪被其勞苦有若此焉疏成烈火焚之不爇壽七十二入滅是為台宗九祖之一先是同學智晞臨終曰吾生兜率見先師智者寶座行列皆已有人惟虗一座彼天人曰却後六年頂法師來升此座計歲論期晞言不謬贊曰影響法化雲龍風虎凡立幟者必有其伍一家教觀至師大昌入多聞海源遠流長附錄台宗十七祖高祖龍樹尊者二祖北齊尊者慧文三祖南岳尊者慧思四祖天台智者智顗五祖章安尊者灌頂六祖法華尊者智威七祖天宮尊者慧威八祖左溪尊者玄朗九祖荊溪尊者湛然十祖興道尊者道𮟏十一祖至行尊者廣修十二祖正定尊者物外十三祖玅說尊者元琇十四祖高論尊者清竦十五祖淨光尊者羲寂十六祖寶雲尊者義通十七祖法智尊者知禮傳見後慈恩玄奘法師傳慈恩玄奘法師洛陽陳氏子幼出家授具年十一即能誦通維摩法華及長負笈西遊謁道基法師受阿毗曇婆沙雜心等論基讚之曰予遊講肆多矣未見少年神悟若此貞觀三年詣闕上表往西域取經帝不許師私遁出玉關抵高昌葉護等國而去途歷四載至中印度即遇大乘居士授瑜珈師地論入王舍城止那蘭陁寺從戒賢論師受瑜珈唯識相宗之旨周遊西域十有餘年閱百三十國凡如來所化之地諸所遺跡無處不至總得梵本諸經論六百五十七部五時之教大小乘論與外道六家七宗異執之計及五明六釋之義靡不該練收羅研究悉得其文以貞觀十九年歸自西域至京師留守房玄齡表聞詔見于儀殿帝曰師去何不相報師曰去時表三上不蒙諒許乃輙私行帝曰師能委命求法惠利蒼生朕甚嘉焉勅就弘福寺翻譯諸經論命玄齡監護資備所須一從天府譯完帝為製大唐三藏聖教序皇太子撰述聖記賜金磨衲寶剃刀後于慈恩寺建大塔安奉新經是為慈恩宗二祖贊曰大教東流其法未普爰有應真委命往取般若流光相宗大啟苦海舟航利濟無已附錄慈恩三祖初祖西天戒賢法師二祖三藏玄奘法師三祖慈恩窺基法師傳見後南山宣律師傳律師諱道宣京兆人姓錢氏吏部尚書申之子母夢月輪貫懷而孕生時母夢梵僧語之曰所孕者梁之佑律師也及長出家以律自持感天送供天童為給使行道心勞疾作忽毗沙門天王授以補心之方即今之補心丹也師以戒壇未合律躬自負土準律新之師行道中夜臨砌蹶仆有少年介冑擁衛之師問汝為誰神曰弟子博叉天王子張瓊也以師戒德故給侍耳師問以世尊在世及滅度之事瓊一一言之計三千八百事隨問隨錄為感通傳神又以所寶佛牙授之靈異之事甚多師撰有內典錄感通錄釋迦譜四分羯磨戒本律疏續高僧傳廣弘明集等書八十一卷並行於世是為南山律宗第九祖贊曰如來設教三學為師定慧所發以戒為基大法東流此教未光南山出一振其綱附錄律宗九祖始祖曇無德尊者二祖曇摩迦羅尊者三祖北臺法聰律師四祖雲中道覆律師五祖大覺慧光律師六祖北齊道雲律師七祖河北道洪律師八祖弘福智首律師九祖南山道宣律師慈恩窺基法師傳窺基法師者代郡人鄂忠武公尉遲敬德之弟敬宗之子也母裴氏夢吞月而生六歲聰慧過人頭有玉枕指文如印未成童便能著書初奘師齋于其第宗命出拜師就其父求之出家宗曰此子悍暴不堪受訓師曰郎君器度非將軍不生非貧道不識宗竟許之帝特旨命度沙彌窺基為大僧入大慈恩寺參譯經正義基每覧䟽記過目成誦師時年十七稟受奘師瑜珈師地唯識宗旨撰述疏鈔及于百部時號百部論師師性豪侈每出必治三車經書食饌時呼之曰三車法師初梵本唯識論十家百卷文浩義博師請奘師糅成十卷至今遵行是為慈恩宗三祖贊曰唯識幽宗義深且玄惟師揭之如日麗天定從兜率預稟彌勒不從中來安知其訣賢首法藏法師傳賢首法師諱法藏康居國人來居長安年十六詣四明阿育王舍利塔煉一指誓學華嚴則天朝䇿名宮禁通天元年詔于太原寺開講華嚴宗旨感白光昱然自口而出須臾成葢萬眾歡呼則天有旨命京城十大德為授滿分戒賜號賢首戒師詔入大遍空寺佐實叉難陀譯華嚴經次講新經至華嚴世界品京師地為之震動召對長生殿問華嚴宗旨師指殿前金獅子說六相十玄五教之義則天忽然領解著其說為金獅子章睿宗受內禪請師授菩薩大戒師糞衣糲食講華嚴三十餘遍楞伽密嚴起信論皆有義疏先天元年終于大薦福寺贈鴻臚卿是為華嚴三祖贊曰大法界網聖凡羅列獨有一綱惟師能挈引萬派流同歸性海五教齊收終古不改附錄華嚴五祖初祖帝心大師法順二祖雲華大師智儼三祖賢首大師法藏四祖清涼大師澄觀傳見後五祖圭峰大師宗密傳見後雲棲以西天馬鳴大師為初祖龍樹大師為二祖後祀帝心至圭峰稱七祖法照禪師傳法照國師唐大曆間止衡州雲封寺為時所宗甞于食鉢中覩五色雲中有梵剎金書題曰大聖竹林寺他日復于鉢中見雲中樓觀萬菩薩眾雜處其中師以所見訪問知識曰據所見形勢乃五臺耳師由是即願遊之後居郡之湖東寺開五會念佛感祥雲彌覆雲中樓閣覩阿彌陀佛及二菩薩身滿虗空有數梵師執錫行道復有一老人謂曰汝先發願遊金色界禮覲十大僧今何輙止師遂與同志遠詣五臺佛光寺一如鉢中所見至大山㵎有石門時二青衣童子引師入門見金碧樓觀金榜題曰大聖竹林寺方約二十里一百院皆金地寶池華臺玉樹入講堂見文殊在西普賢在東踞獅子座為眾說法菩薩萬眾共相圍繞師于二菩薩前作禮問曰末代凡夫未審修何法門文殊告曰諸修行者無如念佛阿彌陀佛願力難思汝當繫念決取往生時二大士同舒金臂以摩其頂記曰汝以念佛力故畢竟證無上覺文殊復曰汝可往詣諸菩薩前作禮承教師一一巡禮眾聖復詣文殊前作禮辭退二青衣送至門外舉頭俱失後代宗詔至宮中加國師號是為淨土四祖贊曰曼殊大士將期一見故金色界鉢中先現及至入門如從舊遊直指極樂是所歸投瑜珈不空三藏法師傳不空三藏法師者西域人幼隨叔父觀光上國值金剛智上師從之傳瑜珈義智授梵本聲明論旬日成誦奇之引入金剛道場以擲花謂為勝己師初求法夢京像皆東行窹以問智智曰汝有受道之資吾何靳哉即授五部及蘇悉地儀軌智沒奉遺教西遊天竺至師子國遇龍智授十八會金剛灌頂及大悲胎藏建壇之法傳經論五百餘部二十九年自師子國歸至廣州採訪使劉巨濟請建灌頂壇感文殊現身天寶元年西城大石康居五國入宼安西召師入內上親秉香爐師誦仁王護國密語上忽見神兵帶甲荷戈立于殿庭師曰此毗沙天王第二子副陛下意往救安西請設食以遣之頃之安西奏城東北黑雲中見金甲神人丈餘空中皷角大鳴聲震天地宼人帳幕間有金鼠囓斷弓弦五國即時奔潰須臾城樓上見天王形謹圖其像以進之即誦呪日也至後每誦呪有奇肅代兩朝尊為灌頂國師後加開府儀同三司肅國公食邑三千戶故今瑜珈密教實宗之贊曰毗盧灌頂是為心印正令全提佛魔聽命奔走神龍潛消百怪是故智者得大自在附錄瑜珈五祖初祖金剛智灌頂國師二祖不空灌頂國師三祖慧朗灌頂法師四祖龍門無畏法師五祖大慧一行法師傳見後
